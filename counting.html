<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Counting Box</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Comic Sans MS', sans-serif; background-color: #ffeaa7; background-image: repeating-linear-gradient(45deg, #ffeaa7, #ffeaa7 20px, #fdcb6e 20px, #fdcb6e 40px); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #controls { background-color: #d63031; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 100; }
        .btn { background-color: #ff9f43; color: white; border: none; border-radius: 8px; padding: 10px 20px; font-size: clamp(1rem, 3vw, 1.2rem); cursor: pointer; font-weight: bold; transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); } .reset-btn { background-color: #0984e3; }
        #play-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #number-display { font-size: clamp(5rem, 20vw, 10rem); font-weight: bold; color: white; text-shadow: 4px 4px 0px #d63031, -2px -2px 0px #d63031, 2px -2px 0px #d63031, -2px 2px 0px #d63031; margin-bottom: 10px; transition: transform 0.2s; z-index: 50; }
        #magic-box { font-size: clamp(6rem, 25vw, 12rem); cursor: pointer; user-select: none; transition: transform 0.1s; z-index: 100; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.3)); }
        #magic-box:active { transform: scale(0.9); }
        .wiggle { animation: wiggleBox 2s infinite ease-in-out; } @keyframes wiggleBox { 0%, 100% { transform: rotate(-5deg) scale(1); } 50% { transform: rotate(5deg) scale(1.05); } }
        #animal-yard { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; overflow: hidden; }
        .animal { position: absolute; font-size: clamp(3rem, 10vw, 6rem); animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; transform: scale(0); }
        @keyframes popIn { 0% { transform: scale(0) translateY(50px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
        .party { animation: jump 0.5s infinite alternate ease-in-out; } @keyframes jump { 0% { transform: translateY(0) scale(1.1); } 100% { transform: translateY(-30px) scale(1.1); } }
    </style>
</head>
<body>
    <div id="controls">
        <button class="btn" onclick="goHome()">🏠 Home</button>
        <button class="btn reset-btn" onclick="resetGame()">🔄 Start Over</button>
    </div>
    <div id="play-area">
        <div id="number-display">0</div>
        <div id="magic-box" class="wiggle" onclick="popAnimal()">🎁</div>
        <div id="animal-yard"></div>
    </div>
    <script>
        let currentCount = 0; const maxCount = 10; const numberDisplay = document.getElementById('number-display'); const magicBox = document.getElementById('magic-box'); const animalYard = document.getElementById('animal-yard'); const animals = ['🐶', '🐱', '🐸', '🐵', '🐷', '🦊', '🐻', '🐼', '🐨', '🐯'];
        let audioCtx; function getAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); return audioCtx; }
        function speak(text) { if ('speechSynthesis' in window) { window.speechSynthesis.cancel(); const utterance = new SpeechSynthesisUtterance(text.toString()); utterance.rate = 0.9; utterance.pitch = 1.3; window.speechSynthesis.speak(utterance); } }
        function playSound(type) {
            const ctx = getAudio(); const osc = ctx.createOscillator(); const gain = ctx.createGain();
            if (type === 'pop') { osc.type = 'sine'; osc.frequency.setValueAtTime(400, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1); gain.gain.setValueAtTime(1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1); }
            else if (type === 'yay') { osc.type = 'triangle'; osc.frequency.setValueAtTime(500, ctx.currentTime); osc.frequency.linearRampToValueAtTime(600, ctx.currentTime + 0.1); osc.frequency.linearRampToValueAtTime(800, ctx.currentTime + 0.2); gain.gain.setValueAtTime(0.5, ctx.currentTime); gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3); }
            osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.3);
        }
        function goHome() { window.location.href = 'index.html'; }
        function resetGame() { currentCount = 0; numberDisplay.innerText = "0"; numberDisplay.style.transform = "scale(1)"; animalYard.innerHTML = ''; magicBox.innerText = '🎁'; speak("Let's count again!"); }
        function popAnimal() {
            if (currentCount >= maxCount) return; currentCount++; playSound('pop'); numberDisplay.innerText = currentCount; numberDisplay.style.transform = "scale(1.5)"; setTimeout(() => { numberDisplay.style.transform = "scale(1)"; }, 200);
            if (currentCount === maxCount) { setTimeout(() => speak("Ten! Yay!"), 100); } else { speak(currentCount); }
            const animalEl = document.createElement('div'); animalEl.classList.add('animal'); animalEl.innerText = animals[Math.floor(Math.random() * animals.length)];
            const randomX = Math.floor(Math.random() * 70) + 10; const randomY = Math.floor(Math.random() * 40) + 50; 
            animalEl.style.left = randomX + '%'; animalEl.style.top = randomY + '%'; animalEl.style.transform = `rotate(${Math.floor(Math.random() * 40) - 20}deg)`; animalYard.appendChild(animalEl);
            if (currentCount === maxCount) { setTimeout(() => { playSound('yay'); magicBox.innerText = '🎉'; document.querySelectorAll('.animal').forEach(a => a.classList.add('party')); }, 500); }
        }
    </script>
</body>
</html>
