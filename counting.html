<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Counting Box</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', sans-serif;
            background-color: #ffeaa7;
            /* Fun diagonal stripes */
            background-image: repeating-linear-gradient(45deg, #ffeaa7, #ffeaa7 20px, #fdcb6e 20px, #fdcb6e 40px);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Navigation */
        #controls {
            background-color: #d63031;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .btn {
            background-color: #ff9f43;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.95); }
        .reset-btn { background-color: #0984e3; }

        /* Play Area */
        #play-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding-top: 20px;
        }

        /* Giant Number Display */
        #number-display {
            font-size: 8rem;
            font-weight: bold;
            color: white;
            text-shadow: 5px 5px 0px #d63031, -2px -2px 0px #d63031, 2px -2px 0px #d63031, -2px 2px 0px #d63031;
            margin-bottom: 20px;
            transition: transform 0.2s;
            z-index: 50;
        }

        /* The Magic Box */
        #magic-box {
            font-size: 10rem;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
            z-index: 100;
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.3));
        }

        #magic-box:active { transform: scale(0.9); }

        /* Wiggle Animation to invite clicking */
        .wiggle {
            animation: wiggleBox 2s infinite ease-in-out;
        }

        @keyframes wiggleBox {
            0%, 100% { transform: rotate(-5deg) scale(1); }
            50% { transform: rotate(5deg) scale(1.05); }
        }

        /* Animal Container */
        #animal-yard {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through to the box */
            z-index: 10;
        }

        /* The Animals */
        .animal {
            position: absolute;
            font-size: 5rem;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transform: scale(0);
        }

        @keyframes popIn {
            0% { transform: scale(0) translateY(50px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* Party animation when reaching 10 */
        .party {
            animation: jump 0.5s infinite alternate ease-in-out;
        }

        @keyframes jump {
            0% { transform: translateY(0) scale(1.1); }
            100% { transform: translateY(-30px) scale(1.1); }
        }

    </style>
</head>
<body>

    <div id="controls">
        <button class="btn" onclick="goHome()">🏠 Home</button>
        <button class="btn reset-btn" onclick="resetGame()">🔄 Start Over</button>
    </div>

    <div id="play-area">
        <div id="number-display">0</div>
        <div id="magic-box" class="wiggle" onclick="popAnimal()">🎁</div>
        <div id="animal-yard"></div>
    </div>

    <script>
        let currentCount = 0;
        const maxCount = 10;
        const numberDisplay = document.getElementById('number-display');
        const magicBox = document.getElementById('magic-box');
        const animalYard = document.getElementById('animal-yard');

        // A fun list of animals to pop out of the box
        const animals = ['🐶', '🐱', '🐸', '🐵', '🐷', '🦊', '🐻', '🐼', '🐨', '🐯'];

        // Text-to-Speech
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text.toString());
                utterance.rate = 0.9;
                utterance.pitch = 1.3; // High, happy pitch
                window.speechSynthesis.speak(utterance);
            }
        }

        // Sound Effects
        function playSound(type) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();

            if (type === 'pop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            } else if (type === 'yay') {
                // A quick, happy trill for reaching 10
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(500, ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(600, ctx.currentTime + 0.1);
                osc.frequency.linearRampToValueAtTime(800, ctx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.5, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
            }

            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.3);
        }

        function goHome() {
            window.location.href = 'index.html';
        }

        function resetGame() {
            currentCount = 0;
            numberDisplay.innerText = "0";
            numberDisplay.style.transform = "scale(1)";
            animalYard.innerHTML = '';
            magicBox.innerText = '🎁';
            magicBox.style.display = 'block';
            speak("Let's count again!");
        }

        function popAnimal() {
            if (currentCount >= maxCount) return; // Stop at 10

            currentCount++;
            playSound('pop');

            // 1. Update the big number
            numberDisplay.innerText = currentCount;
            
            // Make the number bounce
            numberDisplay.style.transform = "scale(1.5)";
            setTimeout(() => { numberDisplay.style.transform = "scale(1)"; }, 200);

            // 2. Speak the number
            if (currentCount === maxCount) {
                setTimeout(() => speak("Ten! Yay!"), 100);
            } else {
                speak(currentCount);
            }

            // 3. Spawn a random animal
            const animalEl = document.createElement('div');
            animalEl.classList.add('animal');
            
            // Pick a random animal from our array
            const randomAnimal = animals[Math.floor(Math.random() * animals.length)];
            animalEl.innerText = randomAnimal;

            // Put it at a random position on the screen
            // Keep it mostly in the lower half/sides so it doesn't cover the big number
            const randomX = Math.floor(Math.random() * 80) + 10; // Between 10% and 90% width
            const randomY = Math.floor(Math.random() * 50) + 40; // Between 40% and 90% height
            
            animalEl.style.left = randomX + '%';
            animalEl.style.top = randomY + '%';

            // Add slight random rotation to make it look messy and fun
            const randomRotation = Math.floor(Math.random() * 40) - 20; // -20deg to 20deg
            animalEl.style.transform = `rotate(${randomRotation}deg)`;

            animalYard.appendChild(animalEl);

            // 4. What happens when we hit 10?
            if (currentCount === maxCount) {
                setTimeout(() => {
                    playSound('yay');
                    magicBox.innerText = '🎉'; // Change box to a party popper
                    
                    // Make all animals do a jump dance
                    const allAnimals = document.querySelectorAll('.animal');
                    allAnimals.forEach(a => a.classList.add('party'));
                }, 500);
            }
        }
    </script>
</body>
</html>
