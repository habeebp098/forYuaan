<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuaan's Magic Space</title>
    <style>
        body { 
            margin: 0; padding: 0; font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            background-color: #81ecec; 
            background-image: radial-gradient(#00cec9 10%, transparent 10%), radial-gradient(#00cec9 10%, transparent 10%); 
            background-size: 60px 60px; background-position: 0 0, 30px 30px; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow-x: hidden; padding-bottom: 40px; 
        }

        h1 { 
            color: #ff7675; font-size: clamp(3rem, 10vw, 5rem); 
            margin-top: 40px; margin-bottom: 0; text-shadow: 4px 4px 0px white; 
            z-index: 10; text-align: center; padding: 0 10px;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        p { 
            font-size: clamp(1.2rem, 5vw, 2rem); color: #2d3436; margin: 10px 10px 40px 10px; 
            font-weight: bold; background-color: white; padding: 10px 30px; border-radius: 30px; 
            border: 5px dashed #ff7675; z-index: 10; text-align: center; 
        }

        .game-grid { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: clamp(20px, 5vw, 40px); 
            width: 90%; max-width: 1000px; z-index: 10; 
        }

        /* Standard HTML link to prevent mobile JS crashes */
        .game-card { 
            background-color: white; border-radius: 30px; 
            width: clamp(150px, 40vw, 280px); height: clamp(160px, 40vw, 250px); 
            color: #2d3436; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.15); border: clamp(5px, 2vw, 8px) solid #0984e3; 
            cursor: pointer; transition: transform 0.2s; text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }

        .game-card:hover { transform: scale(1.05); }
        .game-card:active { transform: scale(0.95); }

        .emoji { font-size: clamp(4rem, 12vw, 6rem); margin-bottom: 15px; }
        .title { font-size: clamp(1.2rem, 5vw, 2rem); font-weight: bold; text-align: center; }

        /* Magic Stars */
        .magic-star { position: absolute; font-size: 2rem; pointer-events: none; animation: floatUp 1s forwards ease-out; z-index: 100; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 1; } 100% { transform: translateY(-100px) scale(1.5) rotate(90deg); opacity: 0; } }
    </style>
</head>
<body>

    <h1>✨ Yuaan's Space ✨</h1>
    <p>What are we playing today, Yuaan?</p>

    <!-- <div class="game-grid">
        <a href="alphabet.html" class="game-card">
            <div class="emoji">🔤</div>
            <div class="title">ABC Adventure</div>
        </a>
        
        <div class="game-card" style="border-color: #b2bec3; opacity: 0.7; cursor: default;">
            <div class="emoji">🔒</div>
            <div class="title">Coming Soon!</div>
        </div>
    </div> -->

    <div class="game-grid">
        <a href="alphabet.html" class="game-card">
            <div class="emoji">🔤</div>
            <div class="title">ABC Adventure</div>
        </a>
        
        <a href="numbers.html" class="game-card" style="border-color: #2ed573;">
            <div class="emoji">🔢</div>
            <div class="title">123 Safari</div>
        </a>

        <a href="balloon.html" class="game-card" style="border-color: #ff4757;">
            <div class="emoji">🎈</div><div class="title">Magic Balloon</div>
        </a>

        <a href="robot.html" class="game-card" style="border-color: #9c88ff;">
            <div class="emoji">🤖</div>
            <div class="title">Build-A-Robot</div>
        </a>
        
        <a href="weather.html" class="game-card" style="border-color: #00cec9;">
            <div class="emoji">🌤️</div><div class="title">Weather Window</div>
        </a>

         <div class="game-card" style="border-color: #b2bec3; opacity: 0.7; cursor: default;">
            <div class="emoji">🔒</div>
            <div class="title">Coming Soon!</div>
        </div>
    </div>

    <script>
        // Fun magic stars when you tap the empty background
        document.body.addEventListener('click', function(e) {
            if (e.target.closest('.game-card')) return;
            const star = document.createElement('div'); 
            star.classList.add('magic-star'); star.innerText = '⭐';
            star.style.left = (e.clientX - 15) + 'px'; star.style.top = (e.clientY - 15) + 'px';
            document.body.appendChild(star); 
            setTimeout(() => { star.remove(); }, 1000);
        });
    </script>
</body>
</html>
