<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape Monster Maker</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Comic Sans MS', sans-serif;
            background-color: #f0f8ff; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }
        #controls {
            background-color: #2c3e50; padding: 10px; display: flex; flex-wrap: wrap; 
            align-items: center; justify-content: center; gap: 10px; color: white; z-index: 20;
        }
        .home-btn {
            background-color: #ff9f43; color: white; border: none; border-radius: 8px;
            padding: 8px 15px; font-size: clamp(1rem, 3vw, 1.2rem); cursor: pointer; font-weight: bold;
        }
        .home-btn:active { transform: scale(0.95); }
        .tools { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 15px; font-weight: bold; }
        input[type="color"] { cursor: pointer; width: 40px; height: 30px; border: none; border-radius: 5px; }
        input[type="range"] { cursor: pointer; width: clamp(80px, 20vw, 150px); }
        #toolbar {
            background-color: #34495e; padding: 10px; display: flex; flex-wrap: wrap; 
            justify-content: center; gap: clamp(5px, 2vw, 15px); box-shadow: 0 4px 8px rgba(0,0,0,0.2); z-index: 20;
        }
        button {
            font-size: clamp(0.9rem, 3vw, 1.2rem); padding: 8px 12px; cursor: pointer;
            border: none; border-radius: 8px; background-color: #ffeb3b; font-weight: bold;
        }
        button:active { transform: scale(0.95); }
        .special-btn { background-color: #00d2d3; color: black; }
        .danger-btn { background-color: #ff4757; color: white; }
        
        #canvas {
            flex-grow: 1; position: relative; background-color: #ffffff;
            background-image: radial-gradient(#d1d8e0 2px, transparent 2px);
            background-size: 30px 30px; overflow: hidden; 
            touch-action: none; /* CRITICAL: Stops mobile browser from scrolling */
        }
        
        .shape { 
            position: absolute; cursor: grab; filter: drop-shadow(3px 3px 5px rgba(0,0,0,0.3)); 
            touch-action: none; user-select: none; /* CRITICAL: Stops shapes from glitching on touch */
        }
        .shape:active { cursor: grabbing; }
        .circle { border-radius: 50%; }
        .triangle { width: 0 !important; height: 0 !important; background-color: transparent !important; border-style: solid; border-color: transparent; }
        .eye { border-radius: 50%; background-color: white !important; border: 3px solid black; display: flex; justify-content: center; align-items: center; }
        .pupil { background-color: black; border-radius: 50%; }
    </style>
</head>
<body>
    <div id="controls">
        <button class="home-btn" onclick="goHome()">🏠 Home</button>
        <div class="tools">
            <label for="shapeColor">🎨 Color:</label><input type="color" id="shapeColor" value="#ff4757">
            <label for="shapeSize">📏 Size:</label><input type="range" id="shapeSize" min="40" max="250" value="100">
        </div>
    </div>
    <div id="toolbar">
        <button onclick="addShape('circle')">🔴 Circle</button>
        <button onclick="addShape('square')">🟦 Square</button>
        <button onclick="addShape('triangle')">🔺 Triangle</button>
        <button class="special-btn" onclick="addShape('eye')">👀 Eye</button>
        <button class="danger-btn" onclick="clearCanvas()">🗑️ Clear</button>
    </div>
    <div id="canvas"></div>

    <script>
        const canvas = document.getElementById('canvas');
        let activeShape = null; let offsetX = 0; let offsetY = 0;

        let audioCtx;
        function getAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume(); return audioCtx;
        }

        function speakWord(word) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.rate = 0.9; utterance.pitch = 1.2; window.speechSynthesis.speak(utterance);
            }
        }
        function playBloop() {
            const ctx = getAudio(); const osc = ctx.createOscillator(); const gainNode = ctx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(300, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(1, ctx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            osc.connect(gainNode); gainNode.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.1);
        }
        function goHome() { playBloop(); setTimeout(() => { window.location.href = 'index.html'; }, 250); }

        function addShape(type) {
            const color = document.getElementById('shapeColor').value;
            const size = document.getElementById('shapeSize').value;
            const shape = document.createElement('div'); shape.classList.add('shape', type);
            
            let spokenWord = type === 'eye' ? 'googly eye' : type;
            shape.dataset.shapeName = spokenWord; speakWord(spokenWord);
            
            if (type === 'triangle') {
                shape.style.borderLeftWidth = (size / 2) + 'px'; shape.style.borderRightWidth = (size / 2) + 'px';
                shape.style.borderBottomWidth = size + 'px'; shape.style.borderBottomColor = color;
            } else if (type === 'eye') {
                shape.style.width = size + 'px'; shape.style.height = size + 'px';
                const pupil = document.createElement('div'); pupil.classList.add('pupil');
                pupil.style.width = (size / 2.5) + 'px'; pupil.style.height = (size / 2.5) + 'px'; shape.appendChild(pupil);
            } else {
                shape.style.width = size + 'px'; shape.style.height = size + 'px'; shape.style.backgroundColor = color;
            }

            // Spawn inside the canvas
            shape.style.left = (canvas.clientWidth / 2 - (size/2)) + 'px';
            shape.style.top = (canvas.clientHeight / 2 - (size/2)) + 'px';

            shape.addEventListener('pointerdown', startDrag);
            shape.addEventListener('dblclick', function() { speakWord('bye bye ' + shape.dataset.shapeName); shape.remove(); });
            canvas.appendChild(shape);
        }

        function clearCanvas() { speakWord('cleared'); canvas.innerHTML = ''; }

        function startDrag(e) {
            activeShape = e.currentTarget; speakWord(activeShape.dataset.shapeName);
            const rect = activeShape.getBoundingClientRect();
            offsetX = e.clientX - rect.left; offsetY = e.clientY - rect.top;
            activeShape.style.zIndex = Date.now();
        }

        // Attached to document to prevent losing the shape if finger moves too fast
        document.addEventListener('pointermove', (e) => {
            if (!activeShape) return;
            e.preventDefault(); // Extra safety to prevent mobile scrolling
            const canvasRect = canvas.getBoundingClientRect();
            // Calculate exactly where the finger is relative to the canvas box!
            let newX = e.clientX - canvasRect.left - offsetX;
            let newY = e.clientY - canvasRect.top - offsetY;
            activeShape.style.left = newX + 'px';
            activeShape.style.top = newY + 'px';
        }, { passive: false });

        document.addEventListener('pointerup', () => { activeShape = null; });
    </script>
</body>
</html>
