<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape Monster Maker: Deluxe</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', sans-serif;
            background-color: #f0f8ff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* The Control Panel (Top) */
        #controls {
            background-color: #2c3e50;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        .home-btn {
            background-color: #ff9f43; /* Bright orange */
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 15px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }

        .home-btn:active {
            transform: scale(0.95);
        }

        .tools {
            display: flex;
            align-items: center;
            gap: 20px;
            margin: 0 auto; /* This perfectly centers the color and size tools */
        }

        input[type="color"] {
            cursor: pointer;
            width: 50px;
            height: 40px;
            border: none;
            border-radius: 5px;
        }

        input[type="range"] {
            cursor: pointer;
            width: 150px;
        }

        /* The Toolbar Panel (Bottom) */
        #toolbar {
            background-color: #34495e;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            z-index: 10;
        }

        button {
            font-size: 18px;
            padding: 10px 15px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #ffeb3b;
            font-weight: bold;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.95);
        }

        .special-btn { background-color: #00d2d3; color: black; }
        .danger-btn { background-color: #ff4757; color: white; margin-left: 20px; }

        /* The Play Area */
        #canvas {
            flex-grow: 1;
            position: relative;
            background-color: #ffffff;
            background-image: radial-gradient(#d1d8e0 2px, transparent 2px);
            background-size: 30px 30px;
            overflow: hidden;
        }

        /* Draggable Shapes */
        .shape {
            position: absolute;
            cursor: grab;
            filter: drop-shadow(3px 3px 5px rgba(0,0,0,0.3));
        }

        .shape:active {
            cursor: grabbing;
        }

        /* Base styles for shapes */
        .circle { border-radius: 50%; }
        .square { }
        .triangle {
            width: 0 !important;
            height: 0 !important;
            background-color: transparent !important;
            border-style: solid;
            border-color: transparent;
        }
        
        /* The Googly Eye */
        .eye {
            border-radius: 50%;
            background-color: white !important;
            border: 3px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .pupil {
            background-color: black;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div id="controls">
        <button class="home-btn" onclick="goHome()">🏠 Home</button>
        
        <div class="tools">
            <label for="shapeColor">🎨 Pick a Color:</label>
            <input type="color" id="shapeColor" value="#ff4757">
            
            <label for="shapeSize">📏 Choose Size:</label>
            <input type="range" id="shapeSize" min="40" max="300" value="120">
        </div>
        
        <div style="width: 85px;"></div> 
    </div>

    <div id="toolbar">
        <button onclick="addShape('circle')">🔴 Circle</button>
        <button onclick="addShape('square')">🟦 Square</button>
        <button onclick="addShape('triangle')">🔺 Triangle</button>
        <button class="special-btn" onclick="addShape('eye')">👀 Googly Eye</button>
        <button class="danger-btn" onclick="clearCanvas()">🗑️ Clear All</button>
    </div>

    <div id="canvas"></div>

    <script>
        const canvas = document.getElementById('canvas');
        let activeShape = null;
        let offsetX = 0;
        let offsetY = 0;

        // Sound Effect Function for the Home Button
        function playBloop() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return; 
            
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(300, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(1, ctx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            
            osc.connect(gainNode);
            gainNode.connect(ctx.destination);
            
            osc.start();
            osc.stop(ctx.currentTime + 0.1);
        }

        // Navigation Function
        function goHome() {
            playBloop();
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 250); // Small delay to let the sound play
        }

        // Shape Spawning Logic
        function addShape(type) {
            const color = document.getElementById('shapeColor').value;
            const size = document.getElementById('shapeSize').value;
            
            const shape = document.createElement('div');
            shape.classList.add('shape', type);
            
            // Apply Dynamic Size and Color
            if (type === 'triangle') {
                shape.style.borderLeftWidth = (size / 2) + 'px';
                shape.style.borderRightWidth = (size / 2) + 'px';
                shape.style.borderBottomWidth = size + 'px';
                shape.style.borderBottomColor = color;
            } else if (type === 'eye') {
                shape.style.width = size + 'px';
                shape.style.height = size + 'px';
                
                const pupil = document.createElement('div');
                pupil.classList.add('pupil');
                pupil.style.width = (size / 2.5) + 'px';
                pupil.style.height = (size / 2.5) + 'px';
                shape.appendChild(pupil);
            } else {
                shape.style.width = size + 'px';
                shape.style.height = size + 'px';
                shape.style.backgroundColor = color;
            }

            // Spawn in the center of the screen
            shape.style.left = (window.innerWidth / 2 - (size/2)) + 'px';
            shape.style.top = (window.innerHeight / 2 - (size/2)) + 'px';

            // Events for dragging and deleting
            shape.addEventListener('pointerdown', startDrag);
            shape.addEventListener('dblclick', function() {
                shape.remove(); 
            });

            canvas.appendChild(shape);
        }

        function clearCanvas() {
            canvas.innerHTML = '';
        }

        // Drag and Drop Logic
        function startDrag(e) {
            activeShape = e.currentTarget;
            const rect = activeShape.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;
            
            activeShape.style.zIndex = Date.now();
        }

        document.addEventListener('pointermove', (e) => {
            if (!activeShape) return;
            activeShape.style.left = (e.clientX - offsetX) + 'px';
            activeShape.style.top = (e.clientY - offsetY) + 'px';
        });

        document.addEventListener('pointerup', () => {
            activeShape = null; 
        });
    </script>

</body>
</html>
