<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuaan's Colors! 🎨</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fffbe8;
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  header {
    background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
    padding: 20px;
    text-align: center;
    position: relative;
  }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 6vw, 3.5rem);
    color: white;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.15);
    letter-spacing: 2px;
  }
  .back-btn {
    position: absolute;
    left: 20px; top: 50%;
    transform: translateY(-50%);
    background: white;
    border: none;
    border-radius: 50px;
    padding: 10px 20px;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    cursor: pointer;
    text-decoration: none;
    color: #333;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    transition: transform 0.2s;
  }
  .back-btn:hover { transform: translateY(-50%) scale(1.05); }
  .subtitle {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: white;
    margin-top: 5px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 25px;
    padding: 40px;
    max-width: 1000px;
    margin: 0 auto;
  }
  .color-card {
    border-radius: 24px;
    padding: 30px 20px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    position: relative;
    overflow: hidden;
  }
  .color-card:hover { transform: translateY(-8px) scale(1.03); box-shadow: 0 16px 35px rgba(0,0,0,0.18); }
  .color-card:active { transform: scale(0.96); }
  .color-emoji { font-size: 3rem; display: block; margin-bottom: 10px; animation: bounce 2s infinite; }
  .color-name {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    color: white;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
  }
  .color-things { font-size: 0.9rem; color: rgba(255,255,255,0.9); margin-top: 5px; font-weight: 700; }
  .pop {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.5); z-index: 100;
  }
  .pop.show { display: flex; }
  .pop-box {
    border-radius: 30px;
    padding: 50px 40px;
    text-align: center;
    max-width: 340px;
    width: 90%;
    animation: popIn 0.3s cubic-bezier(.175,.885,.32,1.275);
  }
  .pop-emoji { font-size: 6rem; }
  .pop-name { font-family: 'Fredoka One', cursive; font-size: 3rem; color: white; text-shadow: 3px 3px 0 rgba(0,0,0,0.2); margin: 10px 0; }
  .pop-say { font-size: 1.4rem; color: white; font-weight: 700; }
  .pop-close {
    margin-top: 20px;
    background: white;
    border: none;
    border-radius: 50px;
    padding: 12px 30px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    cursor: pointer;
  }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  @keyframes popIn { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
</style>
</head>
<body>
<header>
  <a class="back-btn" href="index.html">🏠 Home</a>
  <h1>🎨 Colors!</h1>
  <div class="subtitle">Tap a color to learn it!</div>
</header>

<div class="grid" id="colorGrid"></div>

<div class="pop" id="popup">
  <div class="pop-box" id="popBox">
    <div class="pop-emoji" id="popEmoji"></div>
    <div class="pop-name" id="popName"></div>
    <div class="pop-say" id="popSay"></div>
    <button class="pop-close" onclick="closePopup()">OK! 👍</button>
  </div>
</div>

<script>
const colors = [
  { name: "Red", hex: "#ff4757", emoji: "🍎", things: "Apples, Firetrucks!" },
  { name: "Blue", hex: "#1e90ff", emoji: "🫐", things: "Sky, Ocean!" },
  { name: "Yellow", hex: "#ffd32a", emoji: "🌟", things: "Sun, Bananas!" },
  { name: "Green", hex: "#2ed573", emoji: "🌿", things: "Grass, Frogs!" },
  { name: "Orange", hex: "#ff6348", emoji: "🍊", things: "Oranges, Pumpkins!" },
  { name: "Purple", hex: "#9c44dc", emoji: "🍇", things: "Grapes, Flowers!" },
  { name: "Pink", hex: "#ff6b9d", emoji: "🌸", things: "Flamingos, Roses!" },
  { name: "Brown", hex: "#a0522d", emoji: "🐻", things: "Bears, Chocolate!" },
  { name: "White", hex: "#dfe4ea", emoji: "☁️", things: "Clouds, Snow!" },
  { name: "Black", hex: "#2f3542", emoji: "🐼", things: "Night, Pandas!" },
];

const grid = document.getElementById('colorGrid');
colors.forEach(c => {
  const div = document.createElement('div');
  div.className = 'color-card';
  div.style.background = `linear-gradient(135deg, ${c.hex}cc, ${c.hex})`;
  div.innerHTML = `<span class="color-emoji">${c.emoji}</span><div class="color-name">${c.name}</div><div class="color-things">${c.things}</div>`;
  div.onclick = () => showPopup(c);
  grid.appendChild(div);
});

function showPopup(c) {
  document.getElementById('popBox').style.background = `linear-gradient(135deg, ${c.hex}cc, ${c.hex})`;
  document.getElementById('popEmoji').textContent = c.emoji;
  document.getElementById('popName').textContent = c.name;
  document.getElementById('popSay').textContent = c.things;
  document.getElementById('popup').classList.add('show');
  speak(`This is ${c.name}! ${c.things}`);
}
function closePopup() { document.getElementById('popup').classList.remove('show'); }
document.getElementById('popup').onclick = (e) => { if(e.target.id==='popup') closePopup(); };

function speak(text) {
  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.85; u.pitch = 1.3;
    speechSynthesis.speak(u);
  }
}
</script>
</body>
</html>
