<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuaan's Memory Game! 🃏</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Bubblegum+Sans&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height:100vh;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  font-family:'Bubblegum Sans',cursive;
  overflow-x:hidden;
}

/* Animated background dots */
.bg-dots { position:fixed; top:0;left:0;width:100%;height:100%; pointer-events:none; z-index:0; overflow:hidden; }
.dot { position:absolute; border-radius:50%; opacity:.07; animation: floatDot var(--d) ease-in-out infinite var(--dl) alternate; }
@keyframes floatDot { from{transform:translateY(0)} to{transform:translateY(-30px)} }

header {
  position:relative; z-index:10;
  display:flex; align-items:center; justify-content:center;
  padding:18px 20px 10px;
  flex-wrap:wrap; gap:10px;
}
.back-btn {
  position:absolute; left:20px;
  background:rgba(255,255,255,.12); backdrop-filter:blur(8px);
  border:1.5px solid rgba(255,255,255,.3); border-radius:50px;
  padding:10px 18px; font-family:'Boogaloo',cursive; font-size:1rem;
  color:white; text-decoration:none; transition:all .2s;
}
.back-btn:hover{background:rgba(255,255,255,.22);transform:scale(1.05);}
h1 { font-family:'Boogaloo',cursive; font-size:clamp(2rem,6vw,3.5rem); color:white; text-shadow:0 0 30px rgba(255,200,100,.7),3px 3px 0 rgba(0,0,0,.3); letter-spacing:2px; }

.hud {
  display:flex; justify-content:center; gap:16px;
  padding:0 20px 16px;
  position:relative; z-index:10;
  flex-wrap:wrap;
}
.hud-pill {
  background:rgba(255,255,255,.1); backdrop-filter:blur(8px);
  border:1.5px solid rgba(255,255,255,.25); border-radius:50px;
  padding:10px 22px; font-family:'Boogaloo',cursive; font-size:1.3rem; color:white;
}
.hud-pill .val { font-size:1.7rem; color:#ffe066; }

.grid-wrap { max-width:720px; margin:0 auto; padding:10px 20px 30px; position:relative; z-index:10; }
.card-grid {
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:12px;
}
@media(max-width:500px){
  .card-grid { grid-template-columns:repeat(4,1fr); gap:8px; }
}

.card {
  aspect-ratio:1;
  perspective:600px;
  cursor:pointer;
}
.card-inner {
  width:100%; height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.175,.885,.32,1.275);
  border-radius:18px;
}
.card.flipped .card-inner,
.card.matched .card-inner { transform:rotateY(180deg); }

.card-front, .card-back {
  position:absolute; inset:0;
  border-radius:18px;
  backface-visibility:hidden;
  display:flex; align-items:center; justify-content:center;
}
.card-front {
  background: linear-gradient(135deg, #1e3a5f, #2d5a8e);
  border:2px solid rgba(255,255,255,.15);
  box-shadow:0 6px 20px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.1);
  font-size:2rem;
}
.card-front::after {
  content:'?';
  font-family:'Boogaloo',cursive;
  font-size: clamp(1.5rem,5vw,2.2rem);
  color:rgba(255,255,255,.4);
}
.card-back {
  background: linear-gradient(135deg, #fffbe6, #fff5cc);
  transform:rotateY(180deg);
  border:2px solid rgba(255,210,50,.5);
  box-shadow:0 6px 20px rgba(0,0,0,.2), 0 0 0 0 rgba(255,200,80,.4);
  font-size: clamp(2rem, 7vw, 3rem);
}
.card.matched .card-inner {
  animation: matchPulse .5s ease;
}
.card.matched .card-back {
  background:linear-gradient(135deg, #d4ffd4, #afffaf);
  border-color:rgba(80,220,80,.6);
  box-shadow: 0 0 20px rgba(80,220,80,.5);
}
@keyframes matchPulse {
  0%{transform:rotateY(180deg) scale(1)}
  50%{transform:rotateY(180deg) scale(1.15)}
  100%{transform:rotateY(180deg) scale(1)}
}
.card.shake .card-inner { animation:shake .4s ease; }
@keyframes shake {
  0%,100%{transform:rotateY(180deg) translateX(0)}
  25%{transform:rotateY(180deg) translateX(-6px)}
  75%{transform:rotateY(180deg) translateX(6px)}
}

/* Win screen */
.win-overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,.6); backdrop-filter:blur(10px);
  display:none; align-items:center; justify-content:center;
  z-index:50;
}
.win-overlay.show { display:flex; }
.win-box {
  background:linear-gradient(135deg, #1a3a5c, #2d5a8e);
  border:2px solid rgba(255,220,100,.5);
  border-radius:30px; padding:50px 50px;
  text-align:center; max-width:380px; width:90%;
  animation:popIn .4s cubic-bezier(.175,.885,.32,1.275);
  box-shadow:0 0 60px rgba(255,200,50,.25);
}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.win-box .trophy { font-size:5rem; animation:spin 2s linear infinite; }
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.win-box h2 { font-family:'Boogaloo',cursive; font-size:2.8rem; color:#ffe066; text-shadow:3px 3px 0 rgba(0,0,0,.3); margin:10px 0; }
.win-box p { color:rgba(255,255,255,.85); font-size:1.2rem; margin-bottom:20px; }
.win-btn {
  background:linear-gradient(135deg,#ff6b6b,#feca57);
  border:none; border-radius:50px; padding:14px 36px;
  font-family:'Boogaloo',cursive; font-size:1.4rem;
  color:white; cursor:pointer;
  box-shadow:0 6px 20px rgba(255,100,100,.4);
  transition:transform .2s;
}
.win-btn:hover{transform:scale(1.05);}
</style>
</head>
<body>

<div class="bg-dots" id="bgDots"></div>

<header>
  <a class="back-btn" href="index.html">🏠 Home</a>
  <h1>🃏 Memory Match!</h1>
</header>

<div class="hud">
  <div class="hud-pill">Moves <span class="val" id="moves">0</span></div>
  <div class="hud-pill">Pairs <span class="val" id="pairs">0</span> / <span class="val" id="total">0</span></div>
  <div class="hud-pill">⏱ <span class="val" id="timer">0:00</span></div>
</div>

<div class="grid-wrap">
  <div class="card-grid" id="grid"></div>
</div>

<div class="win-overlay" id="winOverlay">
  <div class="win-box">
    <div class="trophy">🏆</div>
    <h2>You Did It!</h2>
    <p id="winMsg">Amazing Yuaan! 🌟</p>
    <button class="win-btn" onclick="startGame()">Play Again! 🎮</button>
  </div>
</div>

<script>
// BG dots
const bgDots = document.getElementById('bgDots');
const dotColors=['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#2ed573','#a29bfe'];
for(let i=0;i<20;i++){
  const d=document.createElement('div');
  d.className='dot';
  const sz=30+Math.random()*120;
  d.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${dotColors[i%dotColors.length]};--d:${(Math.random()*4+3).toFixed(1)}s;--dl:${(Math.random()*3).toFixed(1)}s`;
  bgDots.appendChild(d);
}

const ALL_EMOJIS = ['🐶','🐱','🐮','🦁','🐸','🦋','🐘','🐧','🦊','🐼','🦄','🐙'];
const TOTAL_PAIRS = 8;

let flipped=[], matched=0, moves=0, locked=false, timerInterval, seconds=0, gameStarted=false;

const grid = document.getElementById('grid');
const movesEl = document.getElementById('moves');
const pairsEl = document.getElementById('pairs');
const totalEl = document.getElementById('total');
const timerEl = document.getElementById('timer');

function startGame(){
  document.getElementById('winOverlay').classList.remove('show');
  clearInterval(timerInterval);
  seconds=0; moves=0; matched=0; flipped=[]; locked=false; gameStarted=false;
  movesEl.textContent=0; pairsEl.textContent=0;
  timerEl.textContent='0:00';
  totalEl.textContent=TOTAL_PAIRS;

  const chosen = ALL_EMOJIS.slice(0,TOTAL_PAIRS);
  const cards = [...chosen,...chosen].sort(()=>Math.random()-.5);

  grid.innerHTML='';
  cards.forEach((emoji,i)=>{
    const card = document.createElement('div');
    card.className='card';
    card.dataset.emoji=emoji;
    card.innerHTML=`<div class="card-inner"><div class="card-front"></div><div class="card-back">${emoji}</div></div>`;
    card.addEventListener('click',()=>flipCard(card));
    grid.appendChild(card);
  });
}

function startTimer(){
  timerInterval=setInterval(()=>{
    seconds++;
    const m=Math.floor(seconds/60), s=seconds%60;
    timerEl.textContent=`${m}:${s.toString().padStart(2,'0')}`;
  },1000);
}

function flipCard(card){
  if(locked || card.classList.contains('flipped') || card.classList.contains('matched')) return;
  if(!gameStarted){ gameStarted=true; startTimer(); }

  card.classList.add('flipped');
  flipped.push(card);

  playFlip();

  if(flipped.length===2){
    locked=true;
    moves++;
    movesEl.textContent=moves;

    const [a,b]=flipped;
    if(a.dataset.emoji===b.dataset.emoji){
      // Match!
      setTimeout(()=>{
        a.classList.remove('flipped'); b.classList.remove('flipped');
        a.classList.add('matched'); b.classList.add('matched');
        matched++;
        pairsEl.textContent=matched;
        playMatch();
        speak(`Yes! ${a.dataset.emoji}!`);
        flipped=[]; locked=false;
        if(matched===TOTAL_PAIRS) setTimeout(showWin, 600);
      },500);
    } else {
      // No match
      setTimeout(()=>{
        a.classList.add('shake'); b.classList.add('shake');
        setTimeout(()=>{
          a.classList.remove('flipped','shake');
          b.classList.remove('flipped','shake');
          flipped=[]; locked=false;
        },400);
      },800);
    }
  }
}

function showWin(){
  clearInterval(timerInterval);
  const m=Math.floor(seconds/60), s=seconds%60;
  document.getElementById('winMsg').textContent=`${moves} moves in ${m}:${s.toString().padStart(2,'0')}! Amazing Yuaan! 🌟`;
  document.getElementById('winOverlay').classList.add('show');
  speak('Wow! You matched all the animals! Amazing Yuaan!');
}

function playFlip(){
  try{
    const c=new(window.AudioContext||window.webkitAudioContext)();
    const o=c.createOscillator(), g=c.createGain();
    o.connect(g); g.connect(c.destination);
    o.frequency.setValueAtTime(400,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(700,c.currentTime+.1);
    g.gain.setValueAtTime(.2,c.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.15);
    o.start(); o.stop(c.currentTime+.15);
  }catch(e){}
}

function playMatch(){
  try{
    const c=new(window.AudioContext||window.webkitAudioContext)();
    [523,659,784].forEach((f,i)=>{
      const o=c.createOscillator(), g=c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type='sine';
      o.frequency.value=f;
      g.gain.setValueAtTime(0,c.currentTime+i*.1);
      g.gain.linearRampToValueAtTime(.3,c.currentTime+i*.1+.05);
      g.gain.exponentialRampToValueAtTime(.001,c.currentTime+i*.1+.3);
      o.start(c.currentTime+i*.1);
      o.stop(c.currentTime+i*.1+.3);
    });
  }catch(e){}
}

function speak(txt){
  if('speechSynthesis' in window){
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(txt);
    u.rate=.9; u.pitch=1.4; speechSynthesis.speak(u);
  }
}

startGame();
</script>
</body>
</html>
