<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Light Lab</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace; /* Changed to a 'coding' font */
            background-color: #1e272e; /* Dark tech background */
            color: #d2dae2;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #controls {
            background-color: #0fbbc9;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: 'Comic Sans MS', sans-serif;
        }

        .btn {
            background-color: #1e272e;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.95); }

        #play-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            position: relative;
        }

        /* The Data Readout */
        #readout-panel {
            background-color: black;
            border: 2px solid #0fbbc9;
            padding: 10px 30px;
            border-radius: 10px;
            font-size: 1.5rem;
            text-align: center;
            box-shadow: 0 0 15px #0fbbc9;
        }

        #hex-code { color: #0fbbc9; font-weight: bold; }

        /* The Glowing Light Orb */
        #orb-container {
            position: relative;
            width: 250px;
            height: 250px;
        }

        #light-orb {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: rgb(0, 0, 0);
            box-shadow: 0 0 50px rgb(0, 0, 0);
            transition: background-color 0.1s, box-shadow 0.1s;
            border: 4px solid #485460;
        }

        /* The Emoji Surprise */
        #surprise-item {
            position: absolute;
            font-size: 8rem;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 50;
        }

        .show-surprise {
            opacity: 1 !important;
            transform: translate(-50%, -150%) scale(1) !important;
        }

        /* Professional RGB Sliders */
        #sliders {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 80%;
            max-width: 600px;
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 15px;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .slider-label {
            font-size: 1.5rem;
            font-weight: bold;
            width: 40px;
        }

        /* Customizing the sliders to make them massive for screen sharing */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 40px;
            width: 40px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -15px;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 10px;
            cursor: pointer;
            border-radius: 5px;
        }

        #r-slider::-webkit-slider-runnable-track { background: #ff4757; }
        #g-slider::-webkit-slider-runnable-track { background: #2ed573; }
        #b-slider::-webkit-slider-runnable-track { background: #1e90ff; }

        .val-display {
            font-size: 1.5rem;
            width: 60px;
            text-align: right;
        }

        /* The Big Scan Button */
        #scan-btn {
            background-color: #ffda79;
            color: black;
            border: none;
            border-radius: 50px;
            padding: 15px 40px;
            font-size: 2rem;
            font-weight: bold;
            font-family: 'Comic Sans MS', sans-serif;
            cursor: pointer;
            box-shadow: 0 5px 0px #ccae62;
            transition: all 0.1s;
        }

        #scan-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0px #ccae62;
        }

    </style>
</head>
<body>

    <div id="controls">
        <button class="btn" onclick="goHome()">🏠 Home</button>
        <span style="font-size: 1.2rem; font-weight:bold;">LAB: ADDITIVE LIGHT MIXING</span>
    </div>

    <div id="play-area">
        
        <div id="readout-panel">
            DATA: <span id="rgb-code">RGB(0, 0, 0)</span> | HEX: <span id="hex-code">#000000</span>
        </div>

        <div id="orb-container">
            <div id="light-orb"></div>
            <div id="surprise-item">✨</div>
        </div>

        <button id="scan-btn" onclick="scanColor()">🔍 SCAN LIGHT</button>

        <div id="sliders">
            <div class="slider-row">
                <span class="slider-label" style="color: #ff4757;">R</span>
                <input type="range" id="r-slider" min="0" max="255" value="0" oninput="updateLiveColor()">
                <span class="val-display" id="r-val">0</span>
            </div>
            <div class="slider-row">
                <span class="slider-label" style="color: #2ed573;">G</span>
                <input type="range" id="g-slider" min="0" max="255" value="0" oninput="updateLiveColor()">
                <span class="val-display" id="g-val">0</span>
            </div>
            <div class="slider-row">
                <span class="slider-label" style="color: #1e90ff;">B</span>
                <input type="range" id="b-slider" min="0" max="255" value="0" oninput="updateLiveColor()">
                <span class="val-display" id="b-val">0</span>
            </div>
        </div>

    </div>

    <script>
        const rSlider = document.getElementById('r-slider');
        const gSlider = document.getElementById('g-slider');
        const bSlider = document.getElementById('b-slider');
        
        const rVal = document.getElementById('r-val');
        const gVal = document.getElementById('g-val');
        const bVal = document.getElementById('b-val');
        
        const lightOrb = document.getElementById('light-orb');
        const rgbCodeDisplay = document.getElementById('rgb-code');
        const hexCodeDisplay = document.getElementById('hex-code');
        const surpriseEl = document.getElementById('surprise-item');

        // Professional Color Thresholds mapping RGB to recognizable toddler items
        const targetColors = [
            { r: 255, g: 0, b: 0, name: "Red", item: "🍎", phrase: "Maximum Red! Like an apple!" },
            { r: 0, g: 255, b: 0, name: "Green", item: "🐸", phrase: "Maximum Green! Like a frog!" },
            { r: 0, g: 0, b: 255, name: "Blue", item: "🐳", phrase: "Maximum Blue! Like a whale!" },
            { r: 255, g: 255, b: 0, name: "Yellow", item: "☀️", phrase: "Red and Green make Yellow! Like the sun!" },
            { r: 0, g: 255, b: 255, name: "Cyan", item: "🧊", phrase: "Green and Blue make Cyan! Like ice!" },
            { r: 255, g: 0, b: 255, name: "Magenta", item: "🌸", phrase: "Red and Blue make Magenta! Like a flower!" },
            { r: 255, g: 255, b: 255, name: "White", item: "☁️", phrase: "All colors on! That makes White light!" },
            { r: 0, g: 0, b: 0, name: "Black", item: "🌌", phrase: "Lights off! Outer space." }
        ];

        function rgbToHex(r, g, b) {
            return "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1).toUpperCase();
        }

        function playSciFiSound() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();

            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, ctx.currentTime);
            osc.frequency.linearRampToValueAtTime(800, ctx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.5, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);

            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.3);
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.9;
                utterance.pitch = 1.1; // Slightly more robotic pitch
                window.speechSynthesis.speak(utterance);
            }
        }

        function goHome() {
            window.location.href = 'index.html';
        }

        // Live update the orb as the sliders move (no sound/voice here to prevent lag)
        function updateLiveColor() {
            const r = parseInt(rSlider.value);
            const g = parseInt(gSlider.value);
            const b = parseInt(bSlider.value);

            rVal.innerText = r;
            gVal.innerText = g;
            bVal.innerText = b;

            const rgbString = `rgb(${r}, ${g}, ${b})`;
            const hexString = rgbToHex(r, g, b);

            lightOrb.style.backgroundColor = rgbString;
            lightOrb.style.boxShadow = `0 0 50px ${rgbString}`;
            
            rgbCodeDisplay.innerText = `RGB(${r}, ${g}, ${b})`;
            hexCodeDisplay.innerText = hexString;

            // Hide the surprise if we move the sliders
            surpriseEl.classList.remove('show-surprise');
        }

        // Triggered by the big yellow SCAN button
        function scanColor() {
            playSciFiSound();

            const r = parseInt(rSlider.value);
            const g = parseInt(gSlider.value);
            const b = parseInt(bSlider.value);

            // Check if they hit one of our exact target colors
            let matchedColor = targetColors.find(c => c.r === r && c.g === g && c.b === b);

            setTimeout(() => {
                if (matchedColor) {
                    surpriseEl.innerText = matchedColor.item;
                    surpriseEl.classList.add('show-surprise');
                    speak(matchedColor.phrase);
                } else {
                    // For any random mix in between the major colors
                    surpriseEl.innerText = "🎨";
                    surpriseEl.classList.add('show-surprise');
                    speak("Custom light mix detected!");
                }
            }, 300);
        }

        // Initialize
        updateLiveColor();
    </script>
</body>
</html>
