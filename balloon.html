<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuaan's Magic Balloon</title>
    <style>
        body { 
            margin: 0; padding: 0; font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            background-color: #f1f2f6; display: flex; flex-direction: column; 
            min-height: 100vh; overflow: hidden; 
        }

        /* Top Navigation */
        #controls { 
            background-color: #ff4757; padding: 10px 20px; display: flex; 
            align-items: center; justify-content: space-between; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 200; position: relative;
        }

        .home-btn { 
            background-color: white; color: #ff4757; border: none; border-radius: 12px; 
            padding: 10px 20px; font-size: clamp(1rem, 4vw, 1.5rem); cursor: pointer; 
            font-weight: bold; text-decoration: none; display: inline-block;
            box-shadow: 0 4px 0px #c0392b; transition: transform 0.1s;
        }
        .home-btn:active { transform: translateY(4px); box-shadow: 0 0px 0px #c0392b; }
        .title-text { color: white; font-size: clamp(1.2rem, 5vw, 2rem); font-weight: bold; text-shadow: 2px 2px 0px rgba(0,0,0,0.2); }

        /* The Play Area */
        #play-area { 
            flex-grow: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; padding: 20px; position: relative;
        }

        /* The Giant Counter */
        #counter-display {
            font-size: clamp(4rem, 15vw, 8rem); font-weight: bold; color: #2f3542;
            text-shadow: 3px 3px 0px white, -3px -3px 0px white, 3px -3px 0px white, -3px 3px 0px white;
            z-index: 10; margin-top: 10px; transition: transform 0.1s;
        }

        /* The Balloon */
        #balloon-container {
            flex-grow: 1; display: flex; align-items: center; justify-content: center;
            position: relative; width: 100%;
        }

        #balloon {
            width: clamp(60px, 15vw, 100px);
            height: clamp(70px, 18vw, 120px);
            background-color: #ff4757;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%; /* Perfect balloon shape */
            position: relative;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.3s;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.2), inset 10px 10px 20px rgba(255,255,255,0.4);
            z-index: 20;
        }

        /* The knot and string of the balloon */
        #balloon::before {
            content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            width: 15px; height: 12px; background-color: inherit; border-radius: 5px;
        }
        #balloon::after {
            content: ''; position: absolute; bottom: -60px; left: 50%; transform: translateX(-50%);
            width: 2px; height: 55px; background-color: #a4b0be;
        }

        /* The Giant Pump Button */
        #pump-btn {
            background-color: #ffa502; color: white; border: 6px solid #ff7f50;
            border-radius: 30px; padding: 20px 40px; font-size: clamp(2rem, 8vw, 3rem);
            font-weight: bold; cursor: pointer; box-shadow: 0 10px 0px #eccc68;
            transition: all 0.1s; margin-bottom: 30px; width: 80%; max-width: 400px;
            font-family: 'Comic Sans MS', sans-serif; -webkit-tap-highlight-color: transparent;
            z-index: 50;
        }

        #pump-btn:active {
            transform: translateY(10px) scale(0.95); box-shadow: 0 0px 0px #eccc68;
        }

        /* Confetti Particles */
        .confetti {
            position: absolute; font-size: clamp(2rem, 8vw, 3rem);
            pointer-events: none; z-index: 100; opacity: 1;
            transition: transform 1s cubic-bezier(0.1, 0.8, 0.3, 1), opacity 1s;
        }

    </style>
</head>
<body>

    <div id="controls">
        <a href="index.html" class="home-btn">🏠 Home</a>
        <div class="title-text">Magic Balloon</div>
    </div>

    <div id="play-area">
        
        <div id="counter-display">0</div>

        <div id="balloon-container">
            <div id="balloon"></div>
        </div>

        <button id="pump-btn" onclick="pumpBalloon()">👇 PUMP IT!</button>

    </div>

    <script>
        let currentCount = 0;
        const maxCount = 10;
        const balloon = document.getElementById('balloon');
        const counterDisplay = document.getElementById('counter-display');
        const container = document.getElementById('balloon-container');
        const pumpBtn = document.getElementById('pump-btn');

        // Fun colors for the balloon to cycle through
        const colors = ['#ff4757', '#1e90ff', '#2ed573', '#ffa502', '#9c88ff', '#eccc68', '#ff6b81', '#7bed9f', '#70a1ff', '#ff7f50'];
        const explosionItems = ['🎉', '⭐', '🎈', '🚗', '🦕', '🍎', '🤖', '🚀', '👦🏻', '✨'];

        // Bulletproof Audio
        let audioCtx; 
        function getAudio() { 
            try {
                if (!audioCtx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (AudioContext) audioCtx = new AudioContext(); 
                }
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); 
                return audioCtx; 
            } catch (e) { return null; }
        }

        function speak(text, pitch = 1.2) { 
            try {
                if ('speechSynthesis' in window) { 
                    window.speechSynthesis.cancel(); 
                    const utterance = new SpeechSynthesisUtterance(text); 
                    utterance.rate = 0.9; utterance.pitch = pitch; window.speechSynthesis.speak(utterance); 
                } 
            } catch (e) {} 
        }

        function playSound(type) {
            try {
                const ctx = getAudio(); if (!ctx) return;
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                
                if (type === 'pump') { 
                    // A funny squeaky pump sound
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(300, ctx.currentTime); 
                    osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.15); 
                    gain.gain.setValueAtTime(0.5, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15); 
                    osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.15);
                }
                else if (type === 'pop') { 
                    // A loud popping explosion
                    osc.type = 'square'; osc.frequency.setValueAtTime(150, ctx.currentTime); 
                    osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.3); 
                    gain.gain.setValueAtTime(1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3); 
                    osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.3);
                }
            } catch (e) {}
        }

        function popBalloon() {
            // Hide balloon and disable button temporarily
            balloon.style.opacity = '0';
            pumpBtn.disabled = true;
            pumpBtn.style.opacity = '0.5';
            
            playSound('pop');
            speak("Ten! Pop! Good job Yuaan!", 1.5);

            // Create an explosion of emojis!
            const rect = balloon.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.classList.add('confetti');
                // Pick random toy from the array
                p.innerText = explosionItems[Math.floor(Math.random() * explosionItems.length)];
                
                // Start exactly where the balloon is
                p.style.left = (centerX - 20) + 'px'; // -20 to center the emoji itself
                p.style.top = (centerY - 20) + 'px';
                
                document.body.appendChild(p);

                // Math to make them fly outward in a circle
                const angle = Math.random() * Math.PI * 2;
                const distance = 150 + Math.random() * 200; // How far they fly
                const flyX = Math.cos(angle) * distance;
                const flyY = Math.sin(angle) * distance;

                // Trigger animation on next frame
                setTimeout(() => {
                    p.style.transform = `translate(${flyX}px, ${flyY}px) rotate(${Math.random() * 360}deg)`;
                    p.style.opacity = '0';
                }, 10);

                // Clean up DOM after animation
                setTimeout(() => p.remove(), 1000);
            }

            // Reset the game automatically after 3.5 seconds
            setTimeout(() => {
                currentCount = 0;
                counterDisplay.innerText = "0";
                balloon.style.transform = `scale(1)`;
                balloon.style.backgroundColor = colors[0];
                balloon.style.opacity = '1';
                pumpBtn.disabled = false;
                pumpBtn.style.opacity = '1';
                speak("Let's do it again!");
            }, 3500);
        }

        function pumpBalloon() {
            if (currentCount >= maxCount) return; // Stop if already popping
            
            currentCount++;

            // Visual updates
            counterDisplay.innerText = currentCount;
            // Make the number bounce
            counterDisplay.style.transform = "scale(1.5)";
            setTimeout(() => { counterDisplay.style.transform = "scale(1)"; }, 150);

            // Change Balloon Color and Size
            balloon.style.backgroundColor = colors[currentCount % colors.length];
            // It grows by 30% every single click!
            const newScale = 1 + (currentCount * 0.3);
            balloon.style.transform = `scale(${newScale})`;

            if (currentCount === maxCount) {
                popBalloon(); // Trigger the massive pop!
            } else {
                playSound('pump');
                speak(currentCount); // Speak the number
            }
        }
    </script>
</body>
</html>
