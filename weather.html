<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuaan's Weather Window</title>
    <style>
        body { 
            margin: 0; padding: 0; font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            background-color: #dfe6e9; display: flex; flex-direction: column; 
            min-height: 100vh; overflow: hidden; 
        }

        /* Top Navigation */
        #controls { 
            background-color: #00cec9; padding: 10px 20px; display: flex; 
            align-items: center; justify-content: space-between; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 200; position: relative;
        }

        .home-btn { 
            background-color: white; color: #00cec9; border: none; border-radius: 12px; 
            padding: 10px 20px; font-size: clamp(1rem, 4vw, 1.5rem); cursor: pointer; 
            font-weight: bold; text-decoration: none; display: inline-block;
            box-shadow: 0 4px 0px #00b894; transition: transform 0.1s;
        }
        .home-btn:active { transform: translateY(4px); box-shadow: 0 0px 0px #00b894; }
        .title-text { color: white; font-size: clamp(1.2rem, 5vw, 2rem); font-weight: bold; text-shadow: 2px 2px 0px rgba(0,0,0,0.2); }

        /* The Play Area */
        #play-area { 
            flex-grow: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-evenly; padding: 20px;
        }

        /* The Window Frame */
        #window-frame {
            width: clamp(280px, 80vw, 600px);
            height: clamp(250px, 50vh, 400px);
            background-color: white; border: 15px solid #2d3436; border-radius: 10px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2), inset 0 0 20px rgba(0,0,0,0.5);
            position: relative; overflow: hidden; display: flex; flex-direction: column;
        }
        
        /* Window Crossbars */
        #window-frame::before { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 10px; background-color: #2d3436; z-index: 50; }
        #window-frame::after { content: ''; position: absolute; top: 0; left: 50%; width: 10px; height: 100%; background-color: #2d3436; z-index: 50; }

        /* The Sky & Environment */
        #sky { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-color: #74b9ff; transition: background-color 1.5s ease; z-index: 1;
        }
        
        #ground { 
            position: absolute; bottom: 0; left: -10%; width: 120%; height: 35%; 
            background-color: #55efc4; border-radius: 50% 50% 0 0; 
            transition: background-color 1.5s ease; z-index: 10;
        }

        /* Scenery Elements */
        #sun { 
            position: absolute; top: 10%; left: 10%; font-size: clamp(4rem, 15vw, 6rem); 
            transition: all 1.5s ease; z-index: 5; line-height: 1; animation: spin 20s linear infinite;
        }
        
        #tree {
            position: absolute; bottom: 25%; right: 15%; font-size: clamp(5rem, 20vw, 8rem); 
            z-index: 15; transform-origin: bottom center; transition: transform 0.5s ease;
        }

        /* Hidden Surprise Elements */
        .surprise {
            position: absolute; bottom: 15%; font-size: clamp(3rem, 10vw, 5rem);
            z-index: 20; transform: scale(0); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #flowers { left: 20%; }
        #snowman { left: 30%; }

        .show { transform: scale(1) !important; }

        /* Particle Container for Rain/Snow/Leaves */
        #particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 30; pointer-events: none; }
        .particle { position: absolute; font-size: 1.5rem; user-select: none; }

        /* Weather Control Buttons */
        #weather-buttons {
            display: flex; flex-wrap: wrap; justify-content: center; gap: clamp(10px, 3vw, 20px);
            width: 100%; max-width: 600px;
        }

        .weather-btn {
            background-color: white; border: 4px solid #2d3436; border-radius: 20px;
            padding: 10px clamp(15px, 4vw, 30px); display: flex; flex-direction: column; align-items: center;
            cursor: pointer; box-shadow: 0 6px 0px #2d3436; transition: all 0.1s;
            -webkit-tap-highlight-color: transparent; width: clamp(80px, 20vw, 120px);
        }
        .weather-btn:active { transform: translateY(6px); box-shadow: 0 0px 0px #2d3436; }
        .weather-btn span { font-size: clamp(2rem, 6vw, 3rem); margin-bottom: 5px; }
        .weather-btn div { font-weight: bold; font-size: clamp(1rem, 3vw, 1.2rem); }

        /* Specific Button Colors */
        #btn-sun { border-color: #f1c40f; color: #f39c12; } #btn-sun:active { box-shadow: 0 0px 0px #f1c40f; }
        #btn-rain { border-color: #3498db; color: #2980b9; } #btn-rain:active { box-shadow: 0 0px 0px #3498db; }
        #btn-snow { border-color: #bdc3c7; color: #7f8c8d; } #btn-snow:active { box-shadow: 0 0px 0px #bdc3c7; }
        #btn-wind { border-color: #9b59b6; color: #8e44ad; } #btn-wind:active { box-shadow: 0 0px 0px #9b59b6; }

        /* Animations */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fall { to { transform: translateY(500px); } }
        @keyframes blow { to { transform: translate(600px, 100px) rotate(360deg); } }
        .windy-tree { animation: sway 1s infinite alternate ease-in-out; }
        @keyframes sway { 0% { transform: rotate(-10deg); } 100% { transform: rotate(15deg); } }

    </style>
</head>
<body>

    <div id="controls">
        <a href="index.html" class="home-btn">🏠 Home</a>
        <div class="title-text">Weather Window</div>
    </div>

    <div id="play-area">
        
        <div id="window-frame">
            <div id="sky"></div>
            <div id="sun">☀️</div>
            <div id="tree">🌳</div>
            <div id="ground"></div>
            
            <div id="flowers" class="surprise">🌷🌻🌷</div>
            <div id="snowman" class="surprise">⛄</div>
            
            <div id="particles"></div>
        </div>

        <div id="weather-buttons">
            <button class="weather-btn" id="btn-sun" onclick="setWeather('sun')"><span>☀️</span><div>Sun</div></button>
            <button class="weather-btn" id="btn-rain" onclick="setWeather('rain')"><span>🌧️</span><div>Rain</div></button>
            <button class="weather-btn" id="btn-snow" onclick="setWeather('snow')"><span>❄️</span><div>Snow</div></button>
            <button class="weather-btn" id="btn-wind" onclick="setWeather('wind')"><span>💨</span><div>Wind</div></button>
        </div>
    </div>

    <script>
        const sky = document.getElementById('sky');
        const ground = document.getElementById('ground');
        const sun = document.getElementById('sun');
        const tree = document.getElementById('tree');
        const particles = document.getElementById('particles');
        const flowers = document.getElementById('flowers');
        const snowman = document.getElementById('snowman');
        
        let particleInterval;

        // Bulletproof Audio
        let audioCtx; 
        function getAudio() { 
            try {
                if (!audioCtx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (AudioContext) audioCtx = new AudioContext(); 
                }
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); 
                return audioCtx; 
            } catch (e) { return null; }
        }

        function speak(text) { 
            try {
                if ('speechSynthesis' in window) { 
                    window.speechSynthesis.cancel(); 
                    const utterance = new SpeechSynthesisUtterance(text); 
                    utterance.rate = 0.9; utterance.pitch = 1.2; window.speechSynthesis.speak(utterance); 
                } 
            } catch (e) {} 
        }

        function playSound(type) {
            try {
                const ctx = getAudio(); if (!ctx) return;
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                
                if (type === 'sun') { 
                    osc.type = 'sine'; osc.frequency.setValueAtTime(500, ctx.currentTime); 
                    osc.frequency.exponentialRampToValueAtTime(1000, ctx.currentTime + 0.5); 
                    gain.gain.setValueAtTime(0, ctx.currentTime); gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.1); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1); 
                    osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 1);
                }
                else if (type === 'rain') { 
                    // Quick high pitched pop for a raindrop
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(800, ctx.currentTime); 
                    osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.1); 
                    gain.gain.setValueAtTime(0.3, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1); 
                    osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.1);
                }
                else if (type === 'wind') { 
                    // Low swoosh
                    osc.type = 'sine'; osc.frequency.setValueAtTime(100, ctx.currentTime); 
                    osc.frequency.linearRampToValueAtTime(300, ctx.currentTime + 0.5); osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 1);
                    gain.gain.setValueAtTime(0, ctx.currentTime); gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.5); gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 1); 
                    osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 1);
                }
            } catch (e) {}
        }

        function clearWeather() {
            clearInterval(particleInterval);
            particles.innerHTML = '';
            tree.classList.remove('windy-tree');
            flowers.classList.remove('show');
            snowman.classList.remove('show');
            tree.innerText = '🌳'; // Reset to green tree
        }

        function createParticle(emoji, animationType, duration) {
            const p = document.createElement('div');
            p.classList.add('particle');
            p.innerText = emoji;
            
            if (animationType === 'fall') {
                p.style.left = Math.random() * 100 + '%';
                p.style.top = '-20px';
                p.style.animation = `fall ${duration}s linear forwards`;
            } else if (animationType === 'blow') {
                p.style.left = '-30px';
                p.style.top = (Math.random() * 80) + '%';
                p.style.animation = `blow ${duration}s linear forwards`;
            }
            
            particles.appendChild(p);
            setTimeout(() => { p.remove(); }, duration * 1000);
        }

        function setWeather(type) {
            clearWeather();

            if (type === 'sun') {
                speak("It is sunny! Look at the bright sun.");
                playSound('sun');
                sky.style.backgroundColor = '#74b9ff'; // Bright Blue
                ground.style.backgroundColor = '#55efc4'; // Bright Green
                sun.style.opacity = '1';
                sun.style.transform = 'scale(1)';
            } 
            else if (type === 'rain') {
                speak("It is raining! The flowers are growing.");
                sky.style.backgroundColor = '#636e72'; // Grey sky
                ground.style.backgroundColor = '#00b894'; // Darker green
                sun.style.opacity = '0';
                
                // Rain loop
                particleInterval = setInterval(() => {
                    createParticle('💧', 'fall', 1);
                    playSound('rain');
                }, 150);

                // Flowers pop up after a delay
                setTimeout(() => { flowers.classList.add('show'); }, 1500);
            }
            else if (type === 'snow') {
                speak("It is snowing! Let's build a snowman.");
                playSound('sun'); // Magic jingle
                sky.style.backgroundColor = '#b2bec3'; // Frosty sky
                ground.style.backgroundColor = '#ffffff'; // White ground
                sun.style.opacity = '0';
                tree.innerText = '🌲'; // Pine tree for winter
                
                // Snow loop
                particleInterval = setInterval(() => {
                    createParticle('❄️', 'fall', 3);
                }, 200);

                // Snowman pops up
                setTimeout(() => { snowman.classList.add('show'); }, 1500);
            }
            else if (type === 'wind') {
                speak("Whoosh! It is windy! Watch the leaves fly.");
                playSound('wind');
                sky.style.backgroundColor = '#a29bfe'; // Purple-ish windy sky
                ground.style.backgroundColor = '#55efc4'; 
                sun.style.opacity = '0.5';
                
                tree.classList.add('windy-tree');
                
                // Wind sound loop
                let windSoundLoop = setInterval(() => playSound('wind'), 1000);
                
                // Leaves loop
                particleInterval = setInterval(() => {
                    createParticle('🍂', 'blow', 1.5);
                }, 100);

                // Clear the wind sound when they switch weather
                setTimeout(() => { clearInterval(windSoundLoop); }, 4000);
            }
        }

        // Start with sunny weather
        setTimeout(() => setWeather('sun'), 500);
    </script>
</body>
</html>
