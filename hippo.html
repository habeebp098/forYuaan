<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hungry Hippo Subtraction</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', sans-serif;
            background-color: #e8f6f3;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Navigation */
        #controls {
            background-color: #00b894;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .btn {
            background-color: #ff9f43;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.95); }
        .reset-btn { background-color: #0984e3; }

        /* Play Area */
        #play-area {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 20px;
            position: relative;
        }

        /* The Counter */
        #counter-board {
            position: absolute;
            top: 20px;
            font-size: 3rem;
            font-weight: bold;
            color: #2d3436;
            background: white;
            padding: 10px 30px;
            border-radius: 20px;
            border: 5px dashed #00b894;
        }

        /* Apples Container */
        #apple-tree {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            width: 40%;
            justify-content: center;
            z-index: 10;
        }

        .apple {
            font-size: 5rem;
            cursor: pointer;
            transition: all 0.5s ease-in-out;
            user-select: none;
        }

        .apple:hover { transform: scale(1.1); }

        /* The Hippo */
        #hippo {
            font-size: 12rem;
            transition: transform 0.2s;
            user-select: none;
        }

        /* Animation class for eating */
        .eating {
            transform: translate(300px, 0px) scale(0);
            opacity: 0;
        }
    </style>
</head>
<body>

    <div id="controls">
        <button class="btn" onclick="goHome()">🏠 Home</button>
        <button class="btn reset-btn" onclick="spawnApples(5)">🍎 Give 5 Apples</button>
        <button class="btn reset-btn" onclick="spawnApples(10)">🍎 Give 10 Apples</button>
    </div>

    <div id="play-area">
        <div id="counter-board">Apples: <span id="count">0</span></div>
        <div id="apple-tree"></div>
        <div id="hippo">🦛</div>
    </div>

    <script>
        let currentApples = 0;
        const tree = document.getElementById('apple-tree');
        const countDisplay = document.getElementById('count');
        const hippo = document.getElementById('hippo');

        // Text-to-Speech
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.9;
                utterance.pitch = 1.2;
                window.speechSynthesis.speak(utterance);
            }
        }

        // Sound Effects
        function playSound(type) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();

            if (type === 'bloop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            } else if (type === 'chomp') {
                // Lower, rougher sound for a hippo crunch
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.5, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
            }

            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.15);
        }

        function goHome() {
            playSound('bloop');
            setTimeout(() => { window.location.href = 'index.html'; }, 250);
        }

        function spawnApples(num) {
            tree.innerHTML = '';
            currentApples = num;
            updateCounter();
            speak(num + " apples");

            for (let i = 0; i < num; i++) {
                const apple = document.createElement('div');
                apple.classList.add('apple');
                apple.innerText = '🍎';
                apple.onclick = () => eatApple(apple);
                tree.appendChild(apple);
            }
        }

        function eatApple(appleElement) {
            // Prevent double-clicking
            if (appleElement.classList.contains('eating')) return;

            playSound('chomp');
            
            // Make hippo bounce
            hippo.style.transform = 'scale(1.2)';
            setTimeout(() => hippo.style.transform = 'scale(1)', 200);

            // Animate apple
            appleElement.classList.add('eating');
            
            currentApples--;
            updateCounter();
            
            // Speak the remaining number
            if (currentApples === 0) {
                setTimeout(() => speak("All gone!"), 500);
            } else {
                setTimeout(() => speak(currentApples), 500);
            }

            // Remove from HTML after animation
            setTimeout(() => appleElement.remove(), 500);
        }

        function updateCounter() {
            countDisplay.innerText = currentApples;
        }

        // Start with 5 apples
        window.onload = () => spawnApples(5);
    </script>
</body>
</html>
