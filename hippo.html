<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hungry Hippo Subtraction</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Comic Sans MS', sans-serif;
            background-color: #e8f6f3;
            background-image: radial-gradient(#55efc4 10%, transparent 10%), radial-gradient(#55efc4 10%, transparent 10%);
            background-size: 60px 60px; background-position: 0 0, 30px 30px;
            display: flex; flex-direction: column; 
            min-height: 100vh; overflow-x: hidden;
        }

        /* Controls now wrap on small screens */
        #controls {
            background-color: #00b894; padding: 10px 20px;
            display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 100;
        }

        .btn {
            background-color: #ff9f43; color: white; border: none; border-radius: 8px;
            padding: 10px 15px; font-size: clamp(1rem, 3vw, 1.2rem); cursor: pointer; font-weight: bold;
        }
        .btn:active { transform: scale(0.95); }
        .reset-btn { background-color: #0984e3; }

        /* Play Area stacks vertically on mobile, side-by-side on desktop */
        #play-area {
            flex-grow: 1; display: flex; flex-wrap: wrap; 
            align-items: center; justify-content: space-evenly;
            padding: 20px; position: relative; gap: 20px;
        }

        #counter-board {
            position: absolute; top: 10px; left: 10px;
            font-size: clamp(1.5rem, 5vw, 3rem); font-weight: bold;
            color: #2d3436; background: white; padding: 10px 20px;
            border-radius: 20px; border: 5px dashed #00b894; z-index: 50;
        }

        #apple-tree {
            display: flex; flex-wrap: wrap; gap: clamp(5px, 2vw, 15px);
            width: 100%; max-width: 400px; justify-content: center;
            z-index: 10; background: rgba(255,255,255,0.5);
            padding: 20px; border-radius: 30px; border: 4px solid #55efc4;
            margin-top: 80px; /* Leave space for counter */
        }

        .apple {
            font-size: clamp(3rem, 10vw, 5rem); cursor: pointer; transition: transform 0.2s;
            user-select: none; position: relative; z-index: 100;
        }
        .apple:hover { transform: scale(1.1) rotate(-10deg); }

        #hippo {
            font-size: clamp(8rem, 30vw, 12rem); user-select: none;
            filter: drop-shadow(0 15px 10px rgba(0,0,0,0.2));
            position: relative; z-index: 20;
        }
    </style>
</head>
<body>
    <div id="controls">
        <button class="btn" onclick="goHome()">🏠 Home</button>
        <button class="btn reset-btn" onclick="spawnApples(5)">🍎 5 Apples</button>
        <button class="btn reset-btn" onclick="spawnApples(10)">🍎 10 Apples</button>
    </div>
    <div id="play-area">
        <div id="counter-board">Apples: <span id="count">0</span></div>
        <div id="apple-tree"></div>
        <div id="hippo">🦛</div>
    </div>
    <script>
        let currentApples = 0;
        const tree = document.getElementById('apple-tree');
        const countDisplay = document.getElementById('count');
        const hippo = document.getElementById('hippo');

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.9; utterance.pitch = 1.2; window.speechSynthesis.speak(utterance);
            }
        }
        function playSound(type) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext(); const osc = ctx.createOscillator(); const gain = ctx.createGain();
            if (type === 'bloop') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            } else if (type === 'chomp') {
                osc.type = 'square'; osc.frequency.setValueAtTime(150, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.5, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
            }
            osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.15);
        }
        function goHome() {
            playSound('bloop'); setTimeout(() => { window.location.href = 'index.html'; }, 250);
        }
        function spawnApples(num) {
            tree.innerHTML = ''; currentApples = num; updateCounter(); speak(num + " apples");
            for (let i = 0; i < num; i++) {
                const apple = document.createElement('div');
                apple.classList.add('apple'); apple.innerText = '🍎';
                apple.onclick = () => eatApple(apple);
                tree.appendChild(apple);
            }
        }
        function eatApple(appleElement) {
            if (appleElement.classList.contains('flying')) return;
            appleElement.classList.add('flying');
            
            const appleRect = appleElement.getBoundingClientRect();
            const startX = appleRect.left + (appleRect.width / 2);
            const startY = appleRect.top + (appleRect.height / 2);
            
            const hippoRect = hippo.getBoundingClientRect();
            const endX = hippoRect.left + (hippoRect.width * 0.2); 
            const endY = hippoRect.top + (hippoRect.height * 0.6);
            
            const travelX = endX - startX; const travelY = endY - startY;

            const flight = appleElement.animate([
                { transform: 'translate(0px, 0px) scale(1) rotate(0deg)' },
                { transform: `translate(${travelX}px, ${travelY}px) scale(0.2) rotate(360deg)`, opacity: 0 }
            ], { duration: 600, easing: 'cubic-bezier(0.25, 1, 0.5, 1)', fill: 'forwards' });

            flight.onfinish = () => {
                playSound('chomp');
                hippo.animate([
                    { transform: 'scale(1)' }, { transform: 'scale(1.2) rotate(-10deg)' },
                    { transform: 'scale(0.9) rotate(10deg)' }, { transform: 'scale(1.1) rotate(-5deg)' },
                    { transform: 'scale(1)' }
                ], { duration: 400 });
                appleElement.remove(); currentApples--; updateCounter();
                if (currentApples === 0) { setTimeout(() => speak("All gone!"), 300); } 
                else { setTimeout(() => speak(currentApples), 300); }
            };
        }
        function updateCounter() { countDisplay.innerText = currentApples; }
        window.onload = () => spawnApples(5);
    </script>
</body>
</html>
