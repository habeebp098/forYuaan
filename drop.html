<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splat Drop Physics</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Comic Sans MS', sans-serif;
            background-color: #81ecec; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        #controls {
            background-color: #00cec9; padding: 10px 20px; display: flex;
            align-items: center; justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 100;
        }

        .btn {
            background-color: #ff9f43; color: white; border: none; border-radius: 8px;
            padding: 10px 15px; font-size: clamp(1rem, 3vw, 1.2rem); cursor: pointer;
            font-weight: bold; transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        .reset-btn { background-color: #0984e3; margin-left: 10px;}

        #play-area {
            flex-grow: 1; position: relative; display: flex;
            justify-content: space-around; align-items: flex-start; padding-top: 50px;
        }

        #ground {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 15%;
            background-color: #55efc4; border-top: 10px solid #00b894; z-index: 10;
        }

        .drop-zone {
            display: flex; flex-direction: column; align-items: center; width: 45%; z-index: 20;
        }

        .drop-btn {
            background-color: white; border: clamp(3px, 1vw, 5px) solid #2d3436;
            border-radius: 20px; padding: clamp(10px, 2vw, 15px) clamp(10px, 3vw, 30px);
            font-size: clamp(1.2rem, 5vw, 2rem); font-weight: bold; cursor: pointer;
            box-shadow: 0 8px 0px #2d3436; margin-bottom: 20px; transition: all 0.1s;
        }
        .drop-btn:active { transform: translateY(8px); box-shadow: 0 0px 0px #2d3436; }

        .object {
            font-size: clamp(4rem, 15vw, 8rem); position: absolute; top: 180px; 
            user-select: none; filter: drop-shadow(0 20px 10px rgba(0,0,0,0.2));
            /* Dynamically set the height of the emojis for the ground calculation */
            line-height: 1;
        }

        #boulder { left: 20%; transform: translateX(-50%); }
        #feather { left: 80%; transform: translateX(-50%); }

        /* The heavy drop (fast) */
        .fall-heavy {
            transition: top 0.3s cubic-bezier(0.55, 0.085, 0.68, 0.53); 
            /* Drops to exactly the ground line based on font size */
            top: calc(85% - clamp(4rem, 15vw, 8rem)) !important; 
        }

        /* The light drop (slow and floaty) */
        .fall-light {
            transition: top 4s linear; 
            top: calc(85% - clamp(4rem, 15vw, 8rem)) !important;
            animation: sway 2s infinite ease-in-out;
        }

        .shake { animation: earthquake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        @keyframes sway {
            0% { transform: translateX(calc(-50% - 20px)) rotate(-20deg); }
            50% { transform: translateX(calc(-50% + 20px)) rotate(20deg); }
            100% { transform: translateX(calc(-50% - 20px)) rotate(-20deg); }
        }

        @keyframes earthquake {
            10%, 90% { transform: translate3d(-5px, 0, 0); }
            20%, 80% { transform: translate3d(5px, 5px, 0); }
            30%, 50%, 70% { transform: translate3d(-10px, -5px, 0); }
            40%, 60% { transform: translate3d(10px, 5px, 0); }
        }
    </style>
</head>
<body>
    <div id="controls">
        <button class="btn" onclick="goHome()">🏠 Home</button>
        <button class="btn reset-btn" onclick="resetObjects()">🔄 Reset</button>
    </div>
    <div id="play-area">
        <div class="drop-zone" style="position: absolute; left: 20%; transform: translateX(-50%); top: 20px;">
            <button class="drop-btn" onclick="dropHeavy()">Heavy!</button>
        </div>
        <div class="drop-zone" style="position: absolute; left: 80%; transform: translateX(-50%); top: 20px;">
            <button class="drop-btn" onclick="dropLight()">Light!</button>
        </div>

        <div id="boulder" class="object">🪨</div>
        <div id="feather" class="object">🪶</div>
        <div id="ground"></div>
    </div>
    <script>
        const boulder = document.getElementById('boulder');
        const feather = document.getElementById('feather');
        let isHeavyDropped = false; let isLightDropped = false;

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.9; utterance.pitch = 1.2; window.speechSynthesis.speak(utterance);
            }
        }
        function playSound(type) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext(); const osc = ctx.createOscillator(); const gain = ctx.createGain();

            if (type === 'bloop') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.1);
            } else if (type === 'boom') {
                osc.type = 'square'; osc.frequency.setValueAtTime(100, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, ctx.currentTime + 0.4);
                gain.gain.setValueAtTime(1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.4);
            } else if (type === 'twinkle') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(800, ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(1200, ctx.currentTime + 2); 
                gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 2);
                osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 2);
            }
        }
        function goHome() {
            playSound('bloop'); setTimeout(() => { window.location.href = 'index.html'; }, 250);
        }
        function resetObjects() {
            isHeavyDropped = false; isLightDropped = false;
            boulder.classList.remove('fall-heavy'); feather.classList.remove('fall-light');
            speak("Ready!");
        }
        function dropHeavy() {
            if (isHeavyDropped) return;
            isHeavyDropped = true; speak("Heavy!");
            boulder.classList.add('fall-heavy');
            setTimeout(() => {
                playSound('boom'); document.body.classList.add('shake');
                setTimeout(() => { document.body.classList.remove('shake'); }, 400);
            }, 300); 
        }
        function dropLight() {
            if (isLightDropped) return;
            isLightDropped = true; speak("Light!"); playSound('twinkle');
            feather.classList.add('fall-light');
        }
    </script>
</body>
</html>
