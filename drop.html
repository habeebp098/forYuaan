<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splat Drop Physics</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', sans-serif;
            background-color: #81ecec; /* Bright sky blue */
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Navigation */
        #controls {
            background-color: #00cec9;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .btn {
            background-color: #ff9f43;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.95); }
        .reset-btn { background-color: #0984e3; margin-left: 10px;}

        /* Play Area */
        #play-area {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding-top: 50px;
        }

        /* The Ground */
        #ground {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15%;
            background-color: #55efc4; /* Grass green */
            border-top: 10px solid #00b894;
            z-index: 10;
        }

        /* Drop Zones */
        .drop-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 40%;
            z-index: 20;
        }

        .drop-btn {
            background-color: white;
            border: 5px solid #2d3436;
            border-radius: 20px;
            padding: 15px 30px;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 0px #2d3436;
            margin-bottom: 40px;
            transition: all 0.1s;
        }

        .drop-btn:active {
            transform: translateY(10px);
            box-shadow: 0 0px 0px #2d3436;
        }

        /* The Falling Objects */
        .object {
            font-size: 8rem;
            position: absolute;
            top: 180px; /* Starting height */
            user-select: none;
            filter: drop-shadow(0 20px 10px rgba(0,0,0,0.2));
        }

        #boulder { left: 20%; }
        #feather { left: 70%; }

        /* --- Physics Animations --- */
        
        /* The heavy drop (fast) */
        .fall-heavy {
            transition: top 0.3s cubic-bezier(0.55, 0.085, 0.68, 0.53); 
            top: calc(85% - 8rem) !important; /* Drops to the ground */
        }

        /* The light drop (slow and floaty) */
        .fall-light {
            transition: top 4s linear; 
            top: calc(85% - 8rem) !important;
            animation: sway 2s infinite ease-in-out;
        }

        /* Screen Shake Effect for the Boulder */
        .shake {
            animation: earthquake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes sway {
            0% { transform: translateX(-40px) rotate(-20deg); }
            50% { transform: translateX(40px) rotate(20deg); }
            100% { transform: translateX(-40px) rotate(-20deg); }
        }

        @keyframes earthquake {
            10%, 90% { transform: translate3d(-5px, 0, 0); }
            20%, 80% { transform: translate3d(5px, 5px, 0); }
            30%, 50%, 70% { transform: translate3d(-10px, -5px, 0); }
            40%, 60% { transform: translate3d(10px, 5px, 0); }
        }

    </style>
</head>
<body>

    <div id="controls">
        <button class="btn" onclick="goHome()">🏠 Home</button>
        <button class="btn reset-btn" onclick="resetObjects()">🔄 Put Them Back</button>
    </div>

    <div id="play-area">
        <div class="drop-zone" style="position: absolute; left: 10%; top: 20px;">
            <button class="drop-btn" onclick="dropHeavy()">Drop Heavy</button>
        </div>
        
        <div class="drop-zone" style="position: absolute; left: 60%; top: 20px;">
            <button class="drop-btn" onclick="dropLight()">Drop Light</button>
        </div>

        <div id="boulder" class="object">🪨</div>
        <div id="feather" class="object">🪶</div>
        
        <div id="ground"></div>
    </div>

    <script>
        const boulder = document.getElementById('boulder');
        const feather = document.getElementById('feather');
        let isHeavyDropped = false;
        let isLightDropped = false;

        // Text-to-Speech
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.9;
                utterance.pitch = 1.2;
                window.speechSynthesis.speak(utterance);
            }
        }

        // Sound Effects Synthesizer
        function playSound(type) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();

            if (type === 'bloop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            } 
            else if (type === 'boom') {
                // A deep, loud crash for the boulder
                osc.type = 'square';
                osc.frequency.setValueAtTime(100, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, ctx.currentTime + 0.4);
                gain.gain.setValueAtTime(1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.4);
            }
            else if (type === 'twinkle') {
                // A soft, high-pitched magical floaty sound for the feather
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(800, ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(1200, ctx.currentTime + 2); // Sound lasts 2 seconds
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 2);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 2);
            }
        }

        function goHome() {
            playSound('bloop');
            setTimeout(() => { window.location.href = 'index.html'; }, 250);
        }

        function resetObjects() {
            isHeavyDropped = false;
            isLightDropped = false;
            boulder.classList.remove('fall-heavy');
            feather.classList.remove('fall-light');
            speak("Ready!");
        }

        function dropHeavy() {
            if (isHeavyDropped) return;
            isHeavyDropped = true;
            
            speak("Heavy!");
            boulder.classList.add('fall-heavy');

            // The boulder takes exactly 0.3s to fall based on our CSS. 
            // We play the boom and shake the screen right when it hits the ground.
            setTimeout(() => {
                playSound('boom');
                document.body.classList.add('shake');
                
                // Remove the shake class after the animation finishes so it can shake again later
                setTimeout(() => { document.body.classList.remove('shake'); }, 400);
            }, 300); 
        }

        function dropLight() {
            if (isLightDropped) return;
            isLightDropped = true;
            
            speak("Light!");
            playSound('twinkle'); // Sound plays while it falls
            feather.classList.add('fall-light');
        }
    </script>
</body>
</html>
