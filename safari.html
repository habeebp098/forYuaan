<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuaan's Night Safari</title>
    <style>
        body { 
            margin: 0; padding: 0; font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            background-color: #1e272e; /* Very dark night sky */
            display: flex; flex-direction: column; height: 100dvh; overflow: hidden; 
            transition: background-color 2s ease; /* For when the sun rises! */
        }

        /* Top Navigation */
        #controls { 
            background-color: #2c3e50; padding: clamp(10px, 2vw, 15px) 20px; 
            display: flex; align-items: center; justify-content: space-between; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 200; flex-shrink: 0;
            transition: background-color 2s ease;
        }

        .home-btn { 
            background-color: white; color: #2c3e50; border: none; border-radius: 12px; 
            padding: 8px 15px; font-size: clamp(1rem, 4vw, 1.5rem); cursor: pointer; 
            font-weight: bold; text-decoration: none; display: inline-block;
            box-shadow: 0 4px 0px #1a252f; transition: transform 0.1s;
        }
        .home-btn:active { transform: translateY(4px); box-shadow: 0 0px 0px #1a252f; }

        .score-board {
            color: white; font-size: clamp(1.2rem, 5vw, 2rem); font-weight: bold;
            background-color: rgba(0,0,0,0.3); padding: 5px 20px; border-radius: 20px;
        }

        .reset-btn {
            background-color: #f39c12; color: white; border: none; border-radius: 12px;
            padding: 8px 15px; font-size: clamp(1rem, 4vw, 1.2rem); font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0px #e67e22; transition: transform 0.1s;
        }
        .reset-btn:active { transform: translateY(4px); box-shadow: 0 0px 0px #e67e22; }

        /* The Safari Area */
        #play-area {
            flex-grow: 1; position: relative; overflow: hidden;
            background-image: radial-gradient(#2c3e50 2px, transparent 2px);
            background-size: 40px 40px;
            touch-action: none; /* Stops mobile scrolling while exploring */
        }

        /* The Animals */
        .animal {
            position: absolute; font-size: clamp(4rem, 15vw, 6rem);
            user-select: none; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: scale(0.8); /* Sleeping size */
            z-index: 10;
        }

        .animal::after {
            content: '💤'; /* Sleeping Zzzs */
            position: absolute; top: -20px; right: -20px;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            animation: floatZ 2s infinite ease-in-out;
        }

        .awake { transform: scale(1.2) !important; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5)); }
        .awake::after { display: none; /* Remove Zzzs when found */ }

        @keyframes floatZ { 0%, 100% { transform: translateY(0) scale(1); opacity: 1; } 50% { transform: translateY(-10px) scale(1.2); opacity: 0.5; } }

        /* The Dancing Animation for winning */
        .dancing { animation: jump 0.6s infinite alternate ease-in-out; }
        @keyframes jump { 0% { transform: translateY(0) scale(1.2); } 100% { transform: translateY(-20px) scale(1.2); } }

        /* The Pitch Black Flashlight Overlay */
        #flashlight-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
            /* Default state: Pitch black */
            background: radial-gradient(circle at 50% 50%, transparent 0px, rgba(0, 0, 0, 0.98) 0px);
            transition: background 0.1s;
        }

    </style>
</head>
<body>

    <div id="controls">
        <a href="index.html" class="home-btn">🏠 Home</a>
        <div class="score-board">Found: <span id="score">0</span>/5</div>
        <button class="reset-btn" onclick="resetGame()">🔄 Hide</button>
    </div>

    <div id="play-area">
        <div class="animal" id="owl" data-name="Owl" data-sound="Hoot hoot! You found the owl!" style="top: 15%; left: 20%;">🦉</div>
        <div class="animal" id="lion" data-name="Lion" data-sound="Roar! The lion is awake!" style="top: 65%; left: 75%;">🦁</div>
        <div class="animal" id="monkey" data-name="Monkey" data-sound="Ooh ooh ah ah! A monkey!" style="top: 35%; left: 60%;">🐵</div>
        <div class="animal" id="frog" data-name="Frog" data-sound="Ribbit! It's a frog!" style="top: 75%; left: 15%;">🐸</div>
        <div class="animal" id="bear" data-name="Bear" data-sound="Grrr! A big brown bear!" style="top: 10%; left: 70%;">🐻</div>
        
        <div id="flashlight-overlay"></div>
    </div>

    <script>
        const playArea = document.getElementById('play-area');
        const overlay = document.getElementById('flashlight-overlay');
        const animals = document.querySelectorAll('.animal');
        const scoreDisplay = document.getElementById('score');
        const controls = document.getElementById('controls');

        let foundCount = 0;
        const totalAnimals = 5;
        let isGameWon = false;

        // Size of the flashlight beam
        const beamRadius = window.innerWidth > 600 ? 150 : 100;

        // Bulletproof Audio
        let audioCtx; 
        function getAudio() { 
            try {
                if (!audioCtx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (AudioContext) audioCtx = new AudioContext(); 
                }
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); 
                return audioCtx; 
            } catch (e) { return null; }
        }

        function speak(text) { 
            try {
                if ('speechSynthesis' in window) { 
                    window.speechSynthesis.cancel(); 
                    const utterance = new SpeechSynthesisUtterance(text); 
                    utterance.rate = 0.9; utterance.pitch = 1.3; window.speechSynthesis.speak(utterance); 
                } 
            } catch (e) {} 
        }

        function playMagicSound() {
            try {
                const ctx = getAudio(); if (!ctx) return;
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, ctx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.5); 
                gain.gain.setValueAtTime(0, ctx.currentTime); gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.1); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5); 
                osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.5);
            } catch (e) {}
        }

        // --- Flashlight Tracking Logic ---
        function updateFlashlight(e) {
            if (isGameWon) return; // Stop flashlight if game is over

            const rect = playArea.getBoundingClientRect();
            let clientX, clientY;

            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            // Calculate position inside the play area
            const x = clientX - rect.left;
            const y = clientY - rect.top;

            // Move the dark gradient to follow the pointer
            overlay.style.background = `radial-gradient(circle at ${x}px ${y}px, transparent ${beamRadius * 0.5}px, rgba(0, 0, 0, 0.98) ${beamRadius}px)`;

            checkCollisions(clientX, clientY);
        }

        // --- Animal Collision Detection ---
        function checkCollisions(pointerX, pointerY) {
            animals.forEach(animal => {
                // If already found, skip it
                if (animal.classList.contains('awake')) return;

                const rect = animal.getBoundingClientRect();
                const animalCenterX = rect.left + (rect.width / 2);
                const animalCenterY = rect.top + (rect.height / 2);

                // Check distance between pointer and animal center
                const distX = pointerX - animalCenterX;
                const distY = pointerY - animalCenterY;
                const distance = Math.sqrt((distX * distX) + (distY * distY));

                // If the pointer is close enough to the animal...
                if (distance < beamRadius * 0.8) {
                    wakeAnimal(animal);
                }
            });
        }

        function wakeAnimal(animal) {
            animal.classList.add('awake');
            foundCount++;
            scoreDisplay.innerText = foundCount;
            
            speak(animal.dataset.sound);
            playMagicSound();

            if (foundCount === totalAnimals) {
                setTimeout(winGame, 1500);
            }
        }

        function winGame() {
            isGameWon = true;
            
            // Turn on the lights! (Sunrise)
            document.body.style.backgroundColor = '#81ecec';
            controls.style.backgroundColor = '#00cec9';
            playArea.style.backgroundImage = 'none';
            
            // Remove the dark overlay completely
            overlay.style.background = 'transparent';

            // Make all animals dance
            animals.forEach(animal => animal.classList.add('dancing'));

            speak("Yay! You found all the animals! The sun is up!");
        }

        function resetGame() {
            isGameWon = false;
            foundCount = 0;
            scoreDisplay.innerText = "0";
            
            // Turn off the lights! (Nighttime)
            document.body.style.backgroundColor = '#1e272e';
            controls.style.backgroundColor = '#2c3e50';
            playArea.style.backgroundImage = 'radial-gradient(#2c3e50 2px, transparent 2px)';

            // Reset the dark overlay
            overlay.style.background = `radial-gradient(circle at 50% 50%, transparent 0px, rgba(0, 0, 0, 0.98) 0px)`;

            // Put animals back to sleep
            animals.forEach(animal => {
                animal.classList.remove('awake');
                animal.classList.remove('dancing');
                
                // Shuffle their positions slightly for replayability!
                animal.style.top = Math.floor(Math.random() * 70 + 10) + '%';
                animal.style.left = Math.floor(Math.random() * 80 + 10) + '%';
            });

            speak("The animals are hiding again! Where are they?");
        }

        // --- Event Listeners ---
        playArea.addEventListener('mousemove', updateFlashlight);
        playArea.addEventListener('touchmove', (e) => {
            e.preventDefault(); // Stop mobile from scrolling
            updateFlashlight(e);
        }, { passive: false });

        // Hide flashlight when mouse leaves the play area
        playArea.addEventListener('mouseleave', () => {
            if (!isGameWon) overlay.style.background = `rgba(0,0,0,0.98)`;
        });

    </script>
</body>
</html>
