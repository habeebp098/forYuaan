<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seed Garden</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #e0f7fa; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        #controls { background-color: #27ae60; padding: 15px; display: flex; justify-content: space-between; align-items: center; color: white; font-weight: bold; font-size: 1.2rem; }
        .btn { background-color: white; color: #27ae60; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; text-decoration: none; cursor: pointer; }
        
        #play-area { flex-grow: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        
        #dirt-bed { width: 100%; height: 150px; background: #8d6e63; border-top: 15px solid #795548; display: flex; justify-content: center; position: relative; }
        
        #plant-spot { position: absolute; bottom: 120px; font-size: 6rem; display: flex; flex-direction: column; align-items: center; }
        
        #tools { display: flex; gap: 15px; position: absolute; top: 20px; background: white; padding: 15px; border-radius: 20px; border: 4px solid #2ecc71; }
        .tool { font-size: 3.5rem; cursor: pointer; user-select: none; transition: transform 0.1s; padding: 5px; }
        .tool:active { transform: scale(0.9); }
        
        #status-text { position: absolute; top: 120px; font-size: 2rem; font-weight: bold; color: #00695c; text-align: center; width: 100%; }
    </style>
</head>
<body>
    <div id="controls"><a href="index.html" class="btn">🏠 Home</a><div>Seed Garden</div><button class="btn" onclick="reset()">🔄 Replant</button></div>
    
    <div id="play-area">
        <div id="tools">
            <div class="tool" onclick="useTool('shovel')">⛏️</div>
            <div class="tool" onclick="useTool('seed')">🌰</div>
            <div class="tool" onclick="useTool('water')">💦</div>
            <div class="tool" onclick="useTool('sun')">☀️</div>
        </div>

        <div id="status-text">First, we need to dig a hole!</div>
        
        <div id="dirt-bed">
            <div id="plant-spot"></div>
        </div>
    </div>

    <script>
        let step = 0; 
        // Steps: 0 = start, 1 = hole dug, 2 = seed planted, 3 = watered, 4 = sun/grown

        function speak(text) { try { window.speechSynthesis.cancel(); let u = new SpeechSynthesisUtterance(text); u.rate = 0.9; window.speechSynthesis.speak(u); } catch(e){} }

        function useTool(tool) {
            const spot = document.getElementById('plant-spot');
            const status = document.getElementById('status-text');

            if (tool === 'shovel' && step === 0) {
                spot.innerHTML = '<div style="color: #3e2723; font-size: 3rem;">🕳️</div>';
                status.innerText = "Hole dug! Now what goes inside the hole?";
                speak("Hole dug! Now what goes inside the hole?");
                step = 1;
            } 
            else if (tool === 'seed' && step === 1) {
                spot.innerHTML = '<div style="font-size: 3rem;">🌰</div>';
                status.innerText = "Seed planted! Seeds need a drink to grow.";
                speak("Seed planted! Seeds need a drink to grow.");
                step = 2;
            }
            else if (tool === 'water' && step === 2) {
                spot.innerHTML = '<div style="font-size: 5rem;">🌱</div>';
                status.innerText = "Watered! The plant sprouted. Now it needs light!";
                speak("Watered! The plant sprouted. Now it needs light to grow big!");
                step = 3;
            }
            else if (tool === 'sun' && step === 3) {
                spot.innerHTML = '<div style="font-size: 8rem;">🌳</div>';
                status.innerText = "Wow! It grew into a big tree!";
                speak("Wow! It grew into a big tree! Good job, Yuaan.");
                step = 4;
            }
            else {
                // If he picks the wrong order
                if (step === 4) return;
                status.innerText = "That's not the right tool yet! Try something else.";
                speak("That is not the right step yet! Think about what a plant needs next.");
            }
        }

        function reset() {
            step = 0;
            document.getElementById('plant-spot').innerHTML = '';
            document.getElementById('status-text').innerText = "First, we need to dig a hole!";
            speak("Let's grow a new plant. First, we need to dig a hole!");
        }
        
        setTimeout(() => speak("First, we need to dig a hole!"), 500);
    </script>
</body>
</html>
