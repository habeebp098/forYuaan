<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuaan's Veggie Soup</title>
    <style>
        body { 
            margin: 0; padding: 0; font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            background-color: #fdf5e6; /* Warm kitchen color */
            display: flex; flex-direction: column; 
            height: 100dvh; overflow: hidden; 
        }

        /* Top Navigation */
        #controls { 
            background-color: #27ae60; padding: clamp(10px, 2vw, 15px) 20px; 
            display: flex; align-items: center; justify-content: space-between; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 200; flex-shrink: 0;
        }

        .home-btn { 
            background-color: white; color: #27ae60; border: none; border-radius: 12px; 
            padding: 8px 15px; font-size: clamp(1rem, 4vw, 1.5rem); cursor: pointer; 
            font-weight: bold; text-decoration: none; display: inline-block;
            box-shadow: 0 4px 0px #2ecc71; transition: transform 0.1s;
        }
        .home-btn:active { transform: translateY(4px); box-shadow: 0 0px 0px #2ecc71; }
        
        .title-text { color: white; font-size: clamp(1.2rem, 5vw, 2rem); font-weight: bold; text-shadow: 2px 2px 0px rgba(0,0,0,0.2); }

        .reset-btn {
            background-color: #f39c12; color: white; border: none; border-radius: 12px;
            padding: 8px 15px; font-size: clamp(1rem, 4vw, 1.2rem); font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0px #e67e22; transition: transform 0.1s;
        }
        .reset-btn:active { transform: translateY(4px); box-shadow: 0 0px 0px #e67e22; }

        /* The Play Area */
        #play-area {
            flex-grow: 1; position: relative; display: flex; flex-direction: column;
            align-items: center; justify-content: space-between; padding: 20px 10px;
        }

        /* The Soup Pot */
        #pot-container {
            position: relative; margin-top: 20px;
            width: clamp(200px, 60vw, 350px);
            height: clamp(150px, 45vw, 250px);
            background-color: #34495e; /* Dark metal pot */
            border-radius: 20px 20px 100px 100px;
            box-shadow: 0 15px 20px rgba(0,0,0,0.3), inset 0 20px 0 #2c3e50;
            display: flex; align-items: flex-start; justify-content: center;
            padding-top: 20px; z-index: 10;
        }

        /* Pot Handles */
        #pot-container::before, #pot-container::after {
            content: ''; position: absolute; top: 30px;
            width: 30px; height: 50px; background-color: #2c3e50;
            border-radius: 10px; z-index: -1;
        }
        #pot-container::before { left: -20px; }
        #pot-container::after { right: -20px; }

        /* The Broth inside the pot */
        #broth {
            width: 85%; height: 60px;
            background-color: #f39c12; /* Golden soup */
            border-radius: 50%; opacity: 0.8;
            transition: background-color 2s ease;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        
        /* Bubbles when soup is cooking */
        .bubble {
            position: absolute; background-color: rgba(255,255,255,0.4);
            border-radius: 50%; bottom: -10px; opacity: 0;
        }
        .boiling .bubble { animation: boil 1.5s infinite ease-in; }
        @keyframes boil { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-50px) scale(1.5); opacity: 0; } }

        /* The Cutting Board */
        #cutting-board {
            width: 100%; max-width: 600px;
            background-color: #eebb77; /* Wood color */
            border: 8px solid #d49a56; border-radius: 20px;
            padding: clamp(15px, 4vw, 30px); box-sizing: border-box;
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: clamp(10px, 3vw, 20px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
            z-index: 50; margin-bottom: 20px;
        }

        .veggie-card {
            background-color: white; border-radius: 15px;
            padding: 10px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 6px 0px rgba(0,0,0,0.1);
            transition: transform 0.1s; border: 3px solid #f1f2f6;
            -webkit-tap-highlight-color: transparent;
        }
        .veggie-card:active { transform: translateY(6px); box-shadow: 0 0px 0px rgba(0,0,0,0.1); }
        
        .veggie-emoji { font-size: clamp(3.5rem, 10vw, 5rem); line-height: 1; margin-bottom: 5px; pointer-events: none;}
        .veggie-name { font-size: clamp(1rem, 3.5vw, 1.5rem); font-weight: bold; color: #2f3542; pointer-events: none;}

        /* The Flying Animation */
        .flying {
            position: fixed; z-index: 1000; pointer-events: none;
            animation: toss 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes toss {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.5) rotate(180deg); }
            100% { transform: scale(0.2) rotate(360deg); opacity: 0; }
        }

        #word-display {
            position: absolute; top: 10px; font-size: clamp(2rem, 6vw, 3rem);
            font-weight: bold; color: #27ae60; opacity: 0; transition: opacity 0.3s;
            background: white; padding: 5px 20px; border-radius: 20px; border: 4px dashed #2ecc71;
        }

    </style>
</head>
<body>

    <div id="controls">
        <a href="index.html" class="home-btn">🏠 Home</a>
        <div class="title-text">Veggie Soup</div>
        <button class="reset-btn" onclick="resetGame()">🔄 Empty Pot</button>
    </div>

    <div id="play-area">
        <div id="word-display">Carrot</div>

        <div id="pot-container">
            <div id="broth">
                <div class="bubble" style="width: 15px; height: 15px; left: 20%; animation-delay: 0.1s;"></div>
                <div class="bubble" style="width: 25px; height: 25px; left: 50%; animation-delay: 0.5s;"></div>
                <div class="bubble" style="width: 10px; height: 10px; left: 70%; animation-delay: 0.3s;"></div>
                <div class="bubble" style="width: 20px; height: 20px; left: 85%; animation-delay: 0.7s;"></div>
            </div>
        </div>

        <div id="cutting-board">
            </div>
    </div>

    <script>
        const veggies = [
            { name: "Carrot", emoji: "🥕" },
            { name: "Broccoli", emoji: "🥦" },
            { name: "Corn", emoji: "🌽" },
            { name: "Potato", emoji: "🥔" },
            { name: "Tomato", emoji: "🍅" },
            { name: "Onion", emoji: "🧅" }
        ];

        const board = document.getElementById('cutting-board');
        const broth = document.getElementById('broth');
        const wordDisplay = document.getElementById('word-display');
        let veggiesInPot = 0;

        // Safe Audio Engine
        let audioCtx; 
        function getAudio() { 
            try {
                if (!audioCtx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (AudioContext) audioCtx = new AudioContext(); 
                }
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); 
                return audioCtx; 
            } catch (e) { return null; }
        }

        function speak(text) { 
            try {
                if ('speechSynthesis' in window) { 
                    window.speechSynthesis.cancel(); 
                    const utterance = new SpeechSynthesisUtterance(text); 
                    utterance.rate = 0.85; // Slower for clear pronunciation
                    utterance.pitch = 1.2; 
                    window.speechSynthesis.speak(utterance); 
                } 
            } catch (e) {} 
        }

        function playSound(type) {
            try {
                const ctx = getAudio(); if (!ctx) return;
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                
                if (type === 'splash') { 
                    osc.type = 'sine'; osc.frequency.setValueAtTime(400, ctx.currentTime); 
                    osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.3); 
                    gain.gain.setValueAtTime(0.5, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3); 
                    osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.3);
                }
                else if (type === 'magic') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(600, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(800, ctx.currentTime + 0.2);
                    osc.frequency.linearRampToValueAtTime(1200, ctx.currentTime + 0.4);
                    gain.gain.setValueAtTime(0, ctx.currentTime); gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.2); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
                    osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.6);
                }
            } catch (e) {}
        }

        function initGame() {
            board.innerHTML = '';
            veggiesInPot = 0;
            broth.classList.remove('boiling');
            broth.style.backgroundColor = '#f39c12'; // Reset soup color
            wordDisplay.style.opacity = '0';

            veggies.forEach(v => {
                const card = document.createElement('div');
                card.classList.add('veggie-card');
                card.innerHTML = `<div class="veggie-emoji">${v.emoji}</div><div class="veggie-name">${v.name}</div>`;
                
                card.onclick = (e) => tossInPot(card, v);
                board.appendChild(card);
            });
        }

        function tossInPot(cardElement, veggieData) {
            // Prevent clicking twice
            if (cardElement.style.visibility === 'hidden') return;

            // 1. Play sound and speak the word clearly
            playSound('splash');
            speak(veggieData.name);

            // 2. Show the word in big text at the top
            wordDisplay.innerText = veggieData.name;
            wordDisplay.style.opacity = '1';
            
            // 3. Create a clone to animate flying into the pot
            const rect = cardElement.getBoundingClientRect();
            const potRect = broth.getBoundingClientRect();
            
            const flyingVeggie = document.createElement('div');
            flyingVeggie.innerText = veggieData.emoji;
            flyingVeggie.style.fontSize = rect.width * 0.5 + 'px';
            flyingVeggie.classList.add('flying');
            
            // Set starting position to exactly where the card is
            flyingVeggie.style.left = rect.left + (rect.width/4) + 'px';
            flyingVeggie.style.top = rect.top + 'px';
            document.body.appendChild(flyingVeggie);

            // Calculate where it needs to land (center of the pot)
            const targetX = potRect.left + (potRect.width / 2) - rect.left - (rect.width/4);
            const targetY = potRect.top + (potRect.height / 2) - rect.top;

            // Trigger the animation using Web Animations API for accuracy
            const flight = flyingVeggie.animate([
                { transform: 'translate(0px, 0px) scale(1) rotate(0deg)' },
                { transform: `translate(${targetX/2}px, -50px) scale(1.5) rotate(180deg)` }, // Arc up
                { transform: `translate(${targetX}px, ${targetY}px) scale(0.2) rotate(360deg)`, opacity: 0 } // Splash down
            ], { duration: 600, easing: 'ease-in-out', fill: 'forwards' });

            // Hide the original card
            cardElement.style.visibility = 'hidden';

            flight.onfinish = () => {
                flyingVeggie.remove();
                veggiesInPot++;

                // Check if all veggies are in the pot!
                if (veggiesInPot === veggies.length) {
                    setTimeout(() => {
                        broth.classList.add('boiling');
                        broth.style.backgroundColor = '#27ae60'; // Soup turns green!
                        playSound('magic');
                        wordDisplay.innerText = "Vegetable Soup!";
                        speak("Yummy Vegetable Soup! Good job Yuaan!");
                    }, 500);
                } else {
                    // Hide the word after a moment if not done
                    setTimeout(() => wordDisplay.style.opacity = '0', 1500);
                }
            };
        }

        function resetGame() {
            speak("Let's make more soup!");
            initGame();
        }

        // Start the game
        initGame();
    </script>
</body>
</html>
