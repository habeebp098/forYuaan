<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuaan's Numbers! 🔢</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f0f4ff; font-family: 'Nunito', sans-serif; min-height: 100vh; }
  header {
    background: linear-gradient(135deg, #a29bfe, #6c5ce7, #fd79a8);
    padding: 20px;
    text-align: center;
    position: relative;
  }
  header h1 { font-family: 'Fredoka One', cursive; font-size: clamp(2rem,6vw,3.5rem); color: white; text-shadow: 3px 3px 0 rgba(0,0,0,0.15); }
  .back-btn {
    position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
    background: white; border: none; border-radius: 50px; padding: 10px 20px;
    font-family: 'Fredoka One', cursive; font-size: 1rem; cursor: pointer;
    text-decoration: none; color: #333; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    transition: transform 0.2s;
  }
  .back-btn:hover { transform: translateY(-50%) scale(1.05); }
  .subtitle { font-family: 'Fredoka One', cursive; font-size: 1.3rem; color: rgba(255,255,255,0.95); margin-top: 5px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
    padding: 35px;
    max-width: 1000px;
    margin: 0 auto;
  }
  .num-card {
    background: white;
    border-radius: 24px;
    padding: 25px 20px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    transition: transform 0.2s, box-shadow 0.2s;
    border-bottom: 5px solid transparent;
  }
  .num-card:hover { transform: translateY(-6px); box-shadow: 0 14px 30px rgba(0,0,0,0.13); }
  .num-card:active { transform: scale(0.95); }
  .big-num {
    font-family: 'Fredoka One', cursive;
    font-size: 4.5rem;
    line-height: 1;
    margin-bottom: 8px;
  }
  .num-word { font-family: 'Fredoka One', cursive; font-size: 1.3rem; color: #636e72; }
  .dots { font-size: 1.6rem; margin: 10px 0 4px; letter-spacing: 2px; min-height: 40px; }
  .num-emoji { font-size: 1.5rem; }
  .colors { --c1:#ff6b6b;--c2:#feca57;--c3:#48dbfb;--c4:#ff9ff3;--c5:#2ed573;--c6:#f9ca24;--c7:#6c5ce7;--c8:#fd79a8;--c9:#00cec9;--c10:#e17055; }
</style>
</head>
<body>
<header>
  <a class="back-btn" href="index.html">🏠 Home</a>
  <h1>🔢 Numbers!</h1>
  <div class="subtitle">Tap a number — count with Yuaan! ⭐</div>
</header>

<div class="grid colors" id="grid"></div>

<script>
const nums = [
  { n:1, word:"One",   emoji:"🍎", dot:"●" },
  { n:2, word:"Two",   emoji:"🐶", dot:"●●" },
  { n:3, word:"Three", emoji:"🌟", dot:"●●●" },
  { n:4, word:"Four",  emoji:"🦋", dot:"●●●●" },
  { n:5, word:"Five",  emoji:"🐸", dot:"●●●●●" },
  { n:6, word:"Six",   emoji:"🌈", dot:"●●●●●●" },
  { n:7, word:"Seven", emoji:"🦁", dot:"●●●●●●●" },
  { n:8, word:"Eight", emoji:"🐘", dot:"●●●●●●●●" },
  { n:9, word:"Nine",  emoji:"🌸", dot:"●●●●●●●●●" },
  { n:10,word:"Ten",   emoji:"🎉", dot:"●●●●●●●●●●" },
];
const bgs = ["#ff6b6b","#feca57","#48dbfb","#ff9ff3","#2ed573","#f9ca24","#6c5ce7","#fd79a8","#00cec9","#e17055"];

const grid = document.getElementById('grid');
nums.forEach((item, i) => {
  const div = document.createElement('div');
  div.className = 'num-card';
  div.style.borderBottomColor = bgs[i];
  div.innerHTML = `
    <div class="big-num" style="color:${bgs[i]}">${item.n}</div>
    <div class="num-word">${item.word}</div>
    <div class="dots">${item.dot}</div>
    <div class="num-emoji">${item.emoji.repeat(item.n <= 5 ? item.n : 1)}</div>
  `;
  div.onclick = () => {
    div.style.transform = 'scale(0.92)';
    setTimeout(()=>div.style.transform='', 200);
    countUp(item.n, item.word);
  };
  grid.appendChild(div);
});

function countUp(n, word) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  let i = 1;
  function sayNext() {
    if (i > n) {
      setTimeout(()=>{
        const u = new SpeechSynthesisUtterance(`${n}! ${word}! Great job Yuaan!`);
        u.rate = 0.85; u.pitch = 1.4;
        speechSynthesis.speak(u);
      }, 300);
      return;
    }
    const u = new SpeechSynthesisUtterance(String(i));
    u.rate = 0.8; u.pitch = 1.3;
    u.onend = () => { i++; setTimeout(sayNext, 150); };
    speechSynthesis.speak(u);
  }
  sayNext();
}
</script>
</body>
</html>
