<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuaan's Space Mission</title>
    <style>
        body { 
            margin: 0; padding: 0; font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            background-color: #87CEEB; /* Daylight sky */
            display: flex; flex-direction: column; 
            height: 100dvh; overflow: hidden; 
            transition: background-color 3s ease-in-out;
        }

        /* The deep space class to trigger the background change */
        body.in-space { background-color: #0c0c2a; }

        /* Top Navigation */
        #controls { 
            background-color: #9b59b6; padding: clamp(10px, 2vw, 15px) 20px; 
            display: flex; align-items: center; justify-content: space-between; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 200; flex-shrink: 0;
            transition: background-color 3s ease;
        }
        body.in-space #controls { background-color: #2c3e50; }

        .home-btn { 
            background-color: white; color: #9b59b6; border: none; border-radius: 12px; 
            padding: 8px 15px; font-size: clamp(1rem, 4vw, 1.5rem); cursor: pointer; 
            font-weight: bold; text-decoration: none; display: inline-block;
            box-shadow: 0 4px 0px #8e44ad; transition: transform 0.1s;
        }
        .home-btn:active { transform: translateY(4px); box-shadow: 0 0px 0px #8e44ad; }
        .title-text { color: white; font-size: clamp(1.2rem, 5vw, 2rem); font-weight: bold; text-shadow: 2px 2px 0px rgba(0,0,0,0.2); }

        .reset-btn {
            background-color: #f1c40f; color: #d35400; border: none; border-radius: 12px;
            padding: 8px 15px; font-size: clamp(1rem, 4vw, 1.2rem); font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0px #f39c12; transition: transform 0.1s;
        }
        .reset-btn:active { transform: translateY(4px); box-shadow: 0 0px 0px #f39c12; }

        /* Play Area */
        #play-area {
            flex-grow: 1; position: relative; display: flex; flex-direction: column;
            align-items: center; justify-content: flex-end; padding-bottom: 20px;
        }

        #ground {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 25%;
            background-color: #78e08f; border-top: 8px solid #38ada9; z-index: 1;
            transition: transform 3s ease-in-out; /* Ground moves down when we fly up! */
        }
        body.in-space #ground { transform: translateY(100%); }

        /* Space Surprises (Hidden at first) */
        .space-object {
            position: absolute; font-size: clamp(4rem, 15vw, 6rem); opacity: 0;
            transition: opacity 2s ease-in; z-index: 5; pointer-events: none;
        }
        #planet1 { top: 15%; left: 15%; animation: float 4s infinite ease-in-out; }
        #planet2 { top: 30%; right: 15%; font-size: clamp(3rem, 10vw, 4rem); animation: float 5s infinite ease-in-out reverse; }
        #alien { top: 50%; left: 10%; animation: float 3s infinite ease-in-out; }
        body.in-space .space-object { opacity: 1; }

        @keyframes float { 0% { transform: translateY(0); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0); } }

        /* The Rocket Assembly */
        #rocket-assembly {
            position: absolute; bottom: 20%; display: flex; flex-direction: column;
            align-items: center; z-index: 10; transition: transform 2s cubic-bezier(0.5, 0, 0.2, 1);
        }

        .rocket {
            font-size: clamp(6rem, 25vw, 10rem); line-height: 1;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
            z-index: 11; position: relative;
        }

        .fire {
            font-size: clamp(4rem, 15vw, 6rem); line-height: 1; margin-top: -20px;
            opacity: 0; transition: opacity 0.2s; z-index: 10;
            animation: flicker 0.2s infinite alternate;
        }
        .show-fire { opacity: 1; }

        @keyframes flicker { 0% { transform: scale(1); } 100% { transform: scale(1.2) translateY(5px); } }
        .shake { animation: earthquake 0.5s infinite; }
        @keyframes earthquake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            40% { transform: translate(1px, -1px) rotate(0deg); }
            60% { transform: translate(-2px, 2px) rotate(-1deg); }
            80% { transform: translate(3px, -1px) rotate(1deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }

        /* The Fuel Station */
        #fuel-station {
            position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%);
            display: flex; flex-wrap: wrap; justify-content: center; gap: clamp(15px, 4vw, 30px);
            background-color: rgba(255, 255, 255, 0.9); padding: 15px 30px;
            border-radius: 30px; border: 5px dashed #f39c12; z-index: 50;
            transition: transform 1s ease;
        }
        body.in-space #fuel-station { transform: translate(-50%, 200px); } /* Hides it in space */

        .star-fuel {
            font-size: clamp(3rem, 10vw, 4rem); line-height: 1; cursor: grab; user-select: none;
            touch-action: none; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
            transition: transform 0.1s; display: flex; align-items: center; justify-content: center;
        }
        .star-fuel:active { cursor: grabbing; transform: scale(1.2); }

        /* The Giant Launch Button */
        #launch-btn {
            position: absolute; top: 20%; left: 50%; transform: translateX(-50%) scale(0);
            background-color: #e74c3c; color: white; border: 6px solid #c0392b;
            border-radius: 50%; width: clamp(120px, 30vw, 180px); height: clamp(120px, 30vw, 180px);
            font-size: clamp(1.5rem, 5vw, 2.5rem); font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); z-index: 100; opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center; text-align: center;
            -webkit-tap-highlight-color: transparent;
        }
        .show-launch { transform: translateX(-50%) scale(1) !important; opacity: 1 !important; }
        #launch-btn:active { transform: translateX(-50%) scale(0.9) !important; box-shadow: 0 0px 0px rgba(0,0,0,0.5); }

        /* Big Countdown Text */
        #countdown-display {
            position: absolute; top: 30%; left: 50%; transform: translateX(-50%);
            font-size: clamp(8rem, 30vw, 15rem); font-weight: bold; color: white;
            text-shadow: 5px 5px 0px #e74c3c, -2px -2px 0px #e74c3c;
            z-index: 150; opacity: 0; pointer-events: none; transition: transform 0.2s;
        }

    </style>
</head>
<body>

    <div id="controls">
        <a href="index.html" class="home-btn">🏠 Home</a>
        <div class="title-text">Space Mission</div>
        <button class="reset-btn" onclick="resetGame()">🔄 Land</button>
    </div>

    <div id="play-area">
        
        <div id="planet1" class="space-object">🪐</div>
        <div id="planet2" class="space-object">🌍</div>
        <div id="alien" class="space-object">👽</div>

        <div id="ground"></div>

        <div id="countdown-display">5</div>
        <button id="launch-btn" onclick="startCountdown()">LAUNCH!</button>

        <div id="rocket-assembly">
            <div class="rocket" id="rocket-ship">🚀</div>
            <div class="fire" id="rocket-fire">🔥</div>
        </div>

        <div id="fuel-station">
            <div class="star-fuel" id="star1">⭐</div>
            <div class="star-fuel" id="star2">⭐</div>
            <div class="star-fuel" id="star3">⭐</div>
        </div>
    </div>

    <script>
        const stars = document.querySelectorAll('.star-fuel');
        const station = document.getElementById('fuel-station');
        const rocketShip = document.getElementById('rocket-ship');
        const rocketAssembly = document.getElementById('rocket-assembly');
        const rocketFire = document.getElementById('rocket-fire');
        const launchBtn = document.getElementById('launch-btn');
        const countdownDisplay = document.getElementById('countdown-display');
        
        const totalFuel = 3;
        let fuelLoaded = 0;
        let isLaunching = false;

        // Drag and Drop Variables
        let activeStar = null;
        let offsetX = 0; let offsetY = 0;

        // Bulletproof Audio
        let audioCtx; 
        function getAudio() { 
            try {
                if (!audioCtx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (AudioContext) audioCtx = new AudioContext(); 
                }
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); 
                return audioCtx; 
            } catch (e) { return null; }
        }

        function speak(text) { 
            try {
                if ('speechSynthesis' in window) { 
                    window.speechSynthesis.cancel(); 
                    const utterance = new SpeechSynthesisUtterance(text); 
                    utterance.rate = 0.9; utterance.pitch = 1.1; window.speechSynthesis.speak(utterance); 
                } 
            } catch (e) {} 
        }

        function playSound(type) {
            try {
                const ctx = getAudio(); if (!ctx) return;
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                
                if (type === 'ping') { 
                    osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime); 
                    osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1); 
                    gain.gain.setValueAtTime(0.5, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5); 
                    osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.5);
                }
                else if (type === 'beep') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(600, ctx.currentTime);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                    osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.2);
                }
                else if (type === 'rumble') {
                    // Low rumble for rocket launch
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(50, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(150, ctx.currentTime + 2);
                    gain.gain.setValueAtTime(0, ctx.currentTime); 
                    gain.gain.linearRampToValueAtTime(1, ctx.currentTime + 0.5); 
                    gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 3);
                    osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 3);
                }
            } catch (e) {}
        }

        // --- Drag and Drop Logic ---
        stars.forEach(star => {
            star.addEventListener('pointerdown', startDrag);
        });

        function startDrag(e) {
            if (isLaunching) return;
            if (e.target.style.display === 'none') return; // Already loaded
            
            e.preventDefault();
            activeStar = e.target;
            playSound('ping');

            const rect = activeStar.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;

            activeStar.style.position = 'fixed';
            activeStar.style.left = rect.left + 'px';
            activeStar.style.top = rect.top + 'px';
            activeStar.style.zIndex = 1000;
            document.body.appendChild(activeStar);
        }

        document.addEventListener('pointermove', (e) => {
            if (!activeStar) return;
            e.preventDefault();
            activeStar.style.left = (e.clientX - offsetX) + 'px';
            activeStar.style.top = (e.clientY - offsetY) + 'px';
        }, { passive: false });

        document.addEventListener('pointerup', (e) => {
            if (!activeStar) return;

            const starRect = activeStar.getBoundingClientRect();
            const rocketRect = rocketShip.getBoundingClientRect();

            const starCenterX = starRect.left + (starRect.width / 2);
            const starCenterY = starRect.top + (starRect.height / 2);

            // Check if dropped ON the rocket
            const isInside = (
                starCenterX >= rocketRect.left && starCenterX <= rocketRect.right &&
                starCenterY >= rocketRect.top && starCenterY <= rocketRect.bottom
            );

            if (isInside) {
                // SUCCESS! Load fuel into rocket
                playSound('ping');
                activeStar.style.display = 'none'; // Hide the star
                fuelLoaded++;
                
                speak(`${fuelLoaded} star!`);
                
                // Wiggle rocket to show it absorbed fuel
                rocketShip.style.transform = "scale(1.2)";
                setTimeout(() => rocketShip.style.transform = "scale(1)", 200);

                if (fuelLoaded === totalFuel) {
                    setTimeout(() => {
                        speak("Fuel is full! Ready to launch!");
                        launchBtn.classList.add('show-launch');
                    }, 1000);
                }
            } else {
                // Return to station
                activeStar.style.position = 'static';
                station.appendChild(activeStar);
            }

            activeStar = null;
        });

        // --- Launch Sequence ---
        function startCountdown() {
            if (isLaunching) return;
            isLaunching = true;
            
            // Wake up audio
            getAudio();
            
            launchBtn.classList.remove('show-launch');
            countdownDisplay.style.opacity = '1';
            
            let count = 5;
            
            // Interval loops every 1 second
            const timer = setInterval(() => {
                countdownDisplay.innerText = count;
                countdownDisplay.style.transform = "translateX(-50%) scale(1.5)";
                setTimeout(() => countdownDisplay.style.transform = "translateX(-50%) scale(1)", 200);
                
                speak(count.toString());
                playSound('beep');

                count--;

                if (count < 1) {
                    clearInterval(timer);
                    setTimeout(blastOff, 1000);
                }
            }, 1000);
        }

        function blastOff() {
            countdownDisplay.style.opacity = '0';
            speak("Blast off!");
            playSound('rumble');
            
            // Shake rocket and show fire
            rocketAssembly.classList.add('shake');
            rocketFire.classList.add('show-fire');

            // Wait 1 second for drama, then fly up!
            setTimeout(() => {
                rocketAssembly.classList.remove('shake');
                
                // Fly the rocket up!
                rocketAssembly.style.transform = `translateY(-${window.innerHeight}px)`;
                
                // Change background to Space!
                document.body.classList.add('in-space');
                
                setTimeout(() => {
                    speak("Hello Space! Hello Alien!");
                }, 2000);

            }, 1000);
        }

        function resetGame() {
            isLaunching = false;
            fuelLoaded = 0;

            // Reset Environment
            document.body.classList.remove('in-space');
            launchBtn.classList.remove('show-launch');
            rocketFire.classList.remove('show-fire');
            countdownDisplay.style.opacity = '0';

            // Reset Rocket instantly (no transition so it teleports back)
            rocketAssembly.style.transition = 'none';
            rocketAssembly.style.transform = 'translateY(0)';
            
            // Restore transitions for next time
            setTimeout(() => {
                rocketAssembly.style.transition = 'transform 2s cubic-bezier(0.5, 0, 0.2, 1)';
            }, 50);

            // Put Stars back
            stars.forEach(star => {
                star.style.display = 'flex';
                star.style.position = 'static';
                station.appendChild(star);
            });

            speak("Ready to load the rocket!");
        }
    </script>
</body>
</html>
