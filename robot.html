<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build-A-Robot for Yuaan</title>
    <style>
        body { 
            margin: 0; padding: 0; font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            background-color: #2f3542; /* Dark tech background */
            display: flex; flex-direction: column; 
            min-height: 100vh; overflow: hidden; 
        }

        /* Top Navigation */
        #controls { 
            background-color: #9c88ff; padding: 10px 20px; display: flex; 
            align-items: center; justify-content: space-between; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 100;
        }

        .home-btn { 
            background-color: white; color: #9c88ff; border: none; border-radius: 12px; 
            padding: 10px 20px; font-size: clamp(1rem, 4vw, 1.5rem); cursor: pointer; 
            font-weight: bold; text-decoration: none; display: inline-block;
            box-shadow: 0 4px 0px #574b90; transition: transform 0.1s;
        }
        .home-btn:active { transform: translateY(4px); box-shadow: 0 0px 0px #574b90; }
        
        .reset-btn {
            background-color: #ff4757; color: white; border: none; border-radius: 12px;
            padding: 10px 20px; font-size: clamp(1rem, 4vw, 1.2rem); font-weight: bold;
            box-shadow: 0 4px 0px #c0392b; cursor: pointer;
        }
        .reset-btn:active { transform: translateY(4px); box-shadow: 0 0px 0px #c0392b; }

        .title-text { color: white; font-size: clamp(1.2rem, 5vw, 2rem); font-weight: bold; }

        /* The Play Area */
        #play-area { 
            flex-grow: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; padding: 20px;
        }

        /* The Robot Blueprint Grid */
        #blueprint {
            display: grid;
            grid-template-areas: 
                ". head ."
                "l-arm body r-arm"
                ". wheels .";
            gap: 10px;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 20px; border-radius: 30px;
            border: 4px dashed #9c88ff;
            margin-top: 20px;
        }

        /* Target Slots */
        .slot {
            width: clamp(80px, 20vw, 120px);
            height: clamp(80px, 20vw, 120px);
            background-color: rgba(156, 136, 255, 0.2);
            border-radius: 20px; border: 4px dashed #706fd3;
            display: flex; align-items: center; justify-content: center;
        }

        #slot-head { grid-area: head; }
        #slot-body { grid-area: body; }
        #slot-l-arm { grid-area: l-arm; }
        #slot-r-arm { grid-area: r-arm; }
        #slot-wheels { grid-area: wheels; }

        /* Parts Tray at the bottom */
        #parts-tray {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
            background-color: rgba(0,0,0,0.5); padding: 20px;
            border-radius: 20px; width: 100%; max-width: 600px;
            min-height: 120px; box-sizing: border-box;
        }

        /* Draggable Robot Parts */
        .part {
            font-size: clamp(4rem, 15vw, 6rem);
            line-height: 1; cursor: grab; user-select: none;
            touch-action: none; /* Crucial: stops phone from scrolling when dragging */
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            transition: transform 0.1s;
            display: flex; align-items: center; justify-content: center;
            width: clamp(80px, 20vw, 120px); height: clamp(80px, 20vw, 120px);
        }
        
        .part:active { cursor: grabbing; transform: scale(1.1); }
        
        /* Flips the right arm emoji so it faces the body */
        #part-r-arm { transform: scaleX(-1); }
        #part-r-arm:active { transform: scaleX(-1) scale(1.1); }

        /* Dance Animation for when he wins! */
        .dancing { animation: dance 0.8s infinite alternate ease-in-out; border-color: #2ed573 !important; }
        @keyframes dance {
            0% { transform: translateY(0) rotate(-5deg); }
            100% { transform: translateY(-20px) rotate(5deg); }
        }

    </style>
</head>
<body>

    <div id="controls">
        <a href="index.html" class="home-btn">🏠 Home</a>
        <div class="title-text">Build-A-Robot</div>
        <button class="reset-btn" onclick="resetGame()">🔄 Reset</button>
    </div>

    <div id="play-area">
        <div id="blueprint">
            <div class="slot" id="slot-head"></div>
            <div class="slot" id="slot-l-arm"></div>
            <div class="slot" id="slot-body"></div>
            <div class="slot" id="slot-r-arm"></div>
            <div class="slot" id="slot-wheels"></div>
        </div>

        <div id="parts-tray">
            <div class="part" id="part-head" data-name="Robot Head" data-target="slot-head">🤖</div>
            <div class="part" id="part-body" data-name="Robot Body" data-target="slot-body">🎛️</div>
            <div class="part" id="part-l-arm" data-name="Left Arm" data-target="slot-l-arm">🦾</div>
            <div class="part" id="part-r-arm" data-name="Right Arm" data-target="slot-r-arm">🦾</div>
            <div class="part" id="part-wheels" data-name="Robot Wheels" data-target="slot-wheels">🛞</div>
        </div>
    </div>

    <script>
        const parts = document.querySelectorAll('.part');
        const tray = document.getElementById('parts-tray');
        const blueprint = document.getElementById('blueprint');
        let partsSnapped = 0;
        const totalParts = 5;

        // Variables for Drag and Drop
        let activePart = null;
        let originalParent = null;
        let offsetX = 0; let offsetY = 0;

        // Safe Audio Engine
        let audioCtx;
        function getAudio() {
            try {
                if (!audioCtx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (AudioContext) audioCtx = new AudioContext();
                }
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                return audioCtx;
            } catch(e) { return null; }
        }

        function speak(text) {
            try {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.rate = 0.9; utterance.pitch = 0.8; // Lower pitch to sound like a robot!
                    window.speechSynthesis.speak(utterance);
                }
            } catch(e) {}
        }

        function playSound(type) {
            try {
                const ctx = getAudio(); if (!ctx) return;
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                if (type === 'pickup') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(400, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.5, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                } else if (type === 'snap') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(800, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                } else if (type === 'win') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(300, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(400, ctx.currentTime + 0.2);
                    osc.frequency.linearRampToValueAtTime(600, ctx.currentTime + 0.4);
                    gain.gain.setValueAtTime(0.5, ctx.currentTime); gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                }
                osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.5);
            } catch(e) {}
        }

        // Attach touch/mouse events to each part
        parts.forEach(part => {
            part.addEventListener('pointerdown', startDrag);
        });

        function startDrag(e) {
            // Don't drag if it's already snapped in place
            if (e.target.parentNode.classList.contains('slot')) return;
            
            e.preventDefault();
            activePart = e.target;
            originalParent = activePart.parentNode;

            // Make the robot announce what part is being picked up!
            speak(activePart.dataset.name);
            playSound('pickup');

            // Get exact coordinates to stick it to the finger
            const rect = activePart.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;

            // Make it float above everything
            activePart.style.position = 'fixed';
            activePart.style.left = rect.left + 'px';
            activePart.style.top = rect.top + 'px';
            activePart.style.zIndex = 1000;
            document.body.appendChild(activePart); // Move to body so it drags freely
        }

        // Attached to the whole document so it tracks the finger everywhere
        document.addEventListener('pointermove', (e) => {
            if (!activePart) return;
            e.preventDefault();
            activePart.style.left = (e.clientX - offsetX) + 'px';
            activePart.style.top = (e.clientY - offsetY) + 'px';
        }, { passive: false });

        document.addEventListener('pointerup', (e) => {
            if (!activePart) return;

            // Find the correct target slot for this specific piece
            const targetId = activePart.dataset.target;
            const targetSlot = document.getElementById(targetId);
            
            // Get bounding boxes to check for collisions
            const partRect = activePart.getBoundingClientRect();
            const slotRect = targetSlot.getBoundingClientRect();

            // Check if the center of the dragged part is inside the target slot
            const partCenterX = partRect.left + (partRect.width / 2);
            const partCenterY = partRect.top + (partRect.height / 2);

            const isInside = (
                partCenterX >= slotRect.left && partCenterX <= slotRect.right &&
                partCenterY >= slotRect.top && partCenterY <= slotRect.bottom
            );

            if (isInside && targetSlot.children.length === 0) {
                // SUCCESS! Snap it into place
                playSound('snap');
                activePart.style.position = 'static'; // Remove float
                targetSlot.appendChild(activePart); // Lock it in the slot
                activePart.style.cursor = 'default';
                
                partsSnapped++;
                checkWin();
            } else {
                // FAILED: Return it to the parts tray
                activePart.style.position = 'static';
                tray.appendChild(activePart);
            }

            activePart = null;
        });

        function checkWin() {
            if (partsSnapped === totalParts) {
                setTimeout(() => {
                    playSound('win');
                    blueprint.classList.add('dancing');
                    speak("Beep boop! Thank you Yuaan!");
                }, 500);
            }
        }

        function resetGame() {
            partsSnapped = 0;
            blueprint.classList.remove('dancing');
            // Move all parts back to the tray
            parts.forEach(part => {
                part.style.position = 'static';
                part.style.cursor = 'grab';
                tray.appendChild(part);
            });
            speak("Ready to build!");
        }
    </script>
</body>
</html>
